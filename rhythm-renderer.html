<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatTouch - 节奏渲染器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* 游戏容器 - 16:9 比例 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        
        #canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 177.78vh; /* 16:9 */
            max-height: 56.25vw; /* 9/16 */
        }
        
        /* 分层画布 */
        .game-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #bg-layer {
            z-index: 1;
            background: radial-gradient(ellipse at center, #1a1a4e 0%, #0a0a1e 100%);
        }
        
        #camera-layer {
            z-index: 2;
            opacity: 0.3;
            object-fit: cover;
        }
        
        #rhythm-layer {
            z-index: 3;
        }
        
        #ui-layer {
            z-index: 4;
            pointer-events: none;
        }
        
        /* 命中区域指示器 */
        #hit-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
        }
        
        #hit-zone::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }
        
        /* 分数显示 */
        #score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            z-index: 5;
        }
        
        .score-value {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
        }
        
        .combo-value {
            font-size: 24px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
        
        /* 控制面板 */
        #control-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .control-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .control-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
        
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        #beat-data-input {
            display: none;
        }
        
        /* 调试信息 */
        #debug-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #0f0;
            max-width: 300px;
        }
        
        /* 音频上传区域 */
        #audio-controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        #audio-upload {
            display: none;
        }
        
        .upload-label {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: white;
            transition: all 0.3s;
        }
        
        .upload-label:hover {
            transform: scale(1.05);
        }
        
        #audio-player {
            display: none;
        }
        
        /* 开始提示 */
        #start-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            text-align: center;
            color: white;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 音频元素 -->
    <audio id="audio-player" crossorigin="anonymous"></audio>
    
    <!-- 音频控制区 -->
    <div id="audio-controls">
        <label class="upload-label">
            <input type="file" id="audio-upload" accept="audio/mp3,audio/*">
            上传音乐 + 打点数据
        </label>
        <input type="file" id="beat-data-input" accept=".json">
        <label class="upload-label" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <input type="file" id="beat-file-input" accept=".json" onchange="loadBeatData(this)">
            导入打点JSON
        </label>
        <button class="control-btn" onclick="togglePlay()" id="play-btn" disabled>▶ 播放</button>
        <span id="audio-info" style="color: #888; font-size: 12px;">未加载音频</span>
    </div>
    
    <!-- 控制面板 -->
    <div id="control-panel">
        <div style="color: #fff; font-size: 14px; margin-bottom: 10px;">🎮 节奏渲染器</div>
        <button class="control-btn" onclick="rhythmRenderer.toggleDebug()">调试模式</button>
        <button class="control-btn" onclick="simulateHit()">模拟击中</button>
        <div style="margin-top: 10px; color: #888; font-size: 12px;">
            点击/空格: 击中<br>
            调试: D键
        </div>
    </div>
    
    <!-- 分数显示 -->
    <div id="score-display">
        <div class="score-value" id="score">0</div>
        <div class="combo-value" id="combo">Combo: 0</div>
    </div>
    
    <!-- 游戏容器 -->
    <div id="game-container">
        <div id="canvas-wrapper">
            <!-- 背景层 -->
            <canvas id="bg-layer" class="game-layer"></canvas>
            
            <!-- 摄像头背景层（预留） -->
            <video id="camera-layer" class="game-layer" autoplay playsinline muted></video>
            
            <!-- 命中区域 -->
            <div id="hit-zone"></div>
            
            <!-- 节奏图案层 -->
            <canvas id="rhythm-layer" class="game-layer"></canvas>
            
            <!-- UI层 -->
            <canvas id="ui-layer" class="game-layer"></canvas>
        </div>
    </div>
    
    <!-- 开始提示 -->
    <div id="start-hint">
        <div>请先上传音乐和打点数据</div>
        <div style="font-size: 16px; color: #888; margin-top: 10px;">
            支持 .mp3 + .json 打点数据
        </div>
    </div>
    
    <!-- 调试信息 -->
    <div id="debug-info" class="hidden">
        <div>FPS: <span id="fps">0</span></div>
        <div>Audio Time: <span id="audio-time">0.000</span>s</div>
        <div>Active Notes: <span id="active-notes">0</span></div>
        <div>Next Beat: <span id="next-beat">--</span></div>
        <div>Hit Window: <span id="hit-window">--</span>ms</div>
    </div>

    <script>
        /**
         * ============================================
         * BeatTouch 节奏图案渲染模块
         * ============================================
         * 核心功能：
         * - Canvas 2D 渲染，16:9 自适应
         * - 基于 audio.currentTime 的时间同步
         * - 节奏点状态机管理
         * - 放射状运动 + 呼吸动画
         * - 预留命中/错过回调接口
         */

        // ==================== 常量定义 ====================
        const CONSTANTS = {
            // 画布比例
            ASPECT_RATIO: 16 / 9,
            
            // 时间参数（毫秒）
            PRE_GENERATE_TIME: 800,      // 节拍前预生成时间
            ACTIVE_WINDOW_START: 150,    // 可击中窗口开始（节拍前）
            ACTIVE_WINDOW_END: 150,      // 可击中窗口结束（节拍后）
            MISS_THRESHOLD: 300,         // 过期阈值（节拍后）
            
            // 节奏点参数
            NOTE_START_RADIUS: 50,       // 起始半径（距离中心）
            NOTE_END_RADIUS: 400,        // 结束半径
            NOTE_RADIUS: 35,             // 圆形半径
            NOTE_LIFETIME: 800,          // 总生命周期（ms）
            
            // 视觉效果
            BREATH_MIN_SCALE: 0.9,       // 呼吸最小缩放
            BREATH_MAX_SCALE: 1.1,       // 呼吸最大缩放
            BREATH_SPEED: 0.003,         // 呼吸速度
            
            // 颜色配置
            COLORS: {
                PENDING: { r: 100, g: 100, b: 100, a: 0.3 },    // 待触发 - 灰色
                ACTIVE: { r: 0, g: 200, b: 255, a: 1 },         // 可击中 - 青色
                HIT: { r: 0, g: 255, b: 100, a: 1 },            // 已击中 - 绿色
                MISSED: { r: 255, g: 50, b: 50, a: 0.5 }        // 已过期 - 红色
            }
        };

        // ==================== 节奏点状态枚举 ====================
        const NoteState = {
            PENDING: 'pending',     // 预生成，未显示
            SPAWNING: 'spawning',   // 渐入动画中
            ACTIVE: 'active',       // 可击中状态
            HIT: 'hit',            // 已击中
            MISSED: 'missed',      // 已错过/过期
            FADING: 'fading'       // 消失动画中
        };

        // ==================== 节奏点类 ====================
        class RhythmNote {
            /**
             * @param {number} beatTime - 节拍时间戳（秒）
             * @param {number} index - 节拍索引
             * @param {number} angle - 发射角度（弧度）
             */
            constructor(beatTime, index, angle) {
                this.beatTime = beatTime;           // 目标节拍时间
                this.index = index;                  // 节拍序号
                this.angle = angle;                  // 运动角度
                
                // 状态管理
                this.state = NoteState.PENDING;
                this.stateStartTime = 0;             // 当前状态开始时间
                
                // 位置计算
                this.currentRadius = CONSTANTS.NOTE_START_RADIUS;
                this.x = 0;
                this.y = 0;
                
                // 视觉效果
                this.scale = 0;                      // 当前缩放（渐入用）
                this.targetScale = 1;
                this.breathPhase = Math.random() * Math.PI * 2;  // 呼吸相位
                this.opacity = 0;
                
                // 击中效果
                this.hitEffectTime = 0;              // 击中效果剩余时间
                
                console.log(`[RhythmNote #${index}] 创建: beatTime=${beatTime.toFixed(3)}s, angle=${(angle * 180 / Math.PI).toFixed(1)}°`);
            }

            /**
             * 更新节奏点状态
             * @param {number} audioTime - 当前音频播放时间（秒）
             * @param {number} deltaTime - 帧间隔（毫秒）
             * @param {Object} center - 画布中心点 {x, y}
             */
            update(audioTime, deltaTime, center) {
                const timeToBeat = (this.beatTime - audioTime) * 1000;  // 距离节拍的时间（毫秒，正数表示还没到）
                
                // 状态机转换
                this.updateState(timeToBeat, audioTime);
                
                // 根据状态更新视觉效果
                this.updateVisuals(timeToBeat, deltaTime);
                
                // 更新位置
                this.updatePosition(center);
                
                // 自动过期检测
                if (this.state === NoteState.ACTIVE && timeToBeat < -CONSTANTS.MISS_THRESHOLD) {
                    this.miss(audioTime);
                }
            }

            /**
             * 更新状态机
             */
            updateState(timeToBeat, audioTime) {
                const prevState = this.state;
                
                switch (this.state) {
                    case NoteState.PENDING:
                        // 到达预生成时间点，开始渐入
                        if (timeToBeat <= CONSTANTS.PRE_GENERATE_TIME) {
                            this.state = NoteState.SPAWNING;
                            this.stateStartTime = audioTime;
                        }
                        break;
                        
                    case NoteState.SPAWNING:
                        // 渐入完成，进入可击中状态
                        if (timeToBeat <= CONSTANTS.ACTIVE_WINDOW_START) {
                            this.state = NoteState.ACTIVE;
                            this.stateStartTime = audioTime;
                            console.log(`[RhythmNote #${this.index}] 🎯 进入可击中状态`);
                        }
                        break;
                        
                    case NoteState.ACTIVE:
                        // 保持在可击中状态，等待命中或过期
                        break;
                        
                    case NoteState.HIT:
                        // 击中后进入消失动画
                        if (this.hitEffectTime <= 0) {
                            this.state = NoteState.FADING;
                            this.stateStartTime = audioTime;
                        }
                        break;
                        
                    case NoteState.MISSED:
                        // 错过后的消失
                        this.state = NoteState.FADING;
                        this.stateStartTime = audioTime;
                        break;
                        
                    case NoteState.FADING:
                        // 完全消失后可以移除
                        break;
                }
                
                if (prevState !== this.state) {
                    console.log(`[RhythmNote #${this.index}] 状态变更: ${prevState} → ${this.state}`);
                }
            }

            /**
             * 更新视觉效果
             */
            updateVisuals(timeToBeat, deltaTime) {
                // 呼吸动画
                this.breathPhase += CONSTANTS.BREATH_SPEED * deltaTime;
                const breathScale = (Math.sin(this.breathPhase) + 1) / 2;  // 0~1
                
                switch (this.state) {
                    case NoteState.PENDING:
                        this.opacity = 0;
                        this.scale = 0;
                        break;
                        
                    case NoteState.SPAWNING:
                        // 渐入动画 + 从中心向外移动
                        const spawnProgress = 1 - (timeToBeat - CONSTANTS.ACTIVE_WINDOW_START) / 
                                                   (CONSTANTS.PRE_GENERATE_TIME - CONSTANTS.ACTIVE_WINDOW_START);
                        this.opacity = Math.min(1, spawnProgress * 2);
                        this.scale = Math.min(1, spawnProgress);
                        this.currentRadius = CONSTANTS.NOTE_START_RADIUS + 
                            (CONSTANTS.NOTE_END_RADIUS - CONSTANTS.NOTE_START_RADIUS) * (1 - spawnProgress);
                        break;
                        
                    case NoteState.ACTIVE:
                        // 呼吸效果 + 继续向外移动
                        const activeProgress = (CONSTANTS.ACTIVE_WINDOW_START - timeToBeat) / 
                                               (CONSTANTS.ACTIVE_WINDOW_START + CONSTANTS.ACTIVE_WINDOW_END);
                        const moveProgress = Math.min(1, activeProgress);
                        this.currentRadius = CONSTANTS.NOTE_START_RADIUS + 
                            (CONSTANTS.NOTE_END_RADIUS - CONSTANTS.NOTE_START_RADIUS) * moveProgress;
                        this.opacity = 1;
                        this.scale = CONSTANTS.BREATH_MIN_SCALE + 
                            (CONSTANTS.BREATH_MAX_SCALE - CONSTANTS.BREATH_MIN_SCALE) * breathScale;
                        break;
                        
                    case NoteState.HIT:
                        // 击中效果：快速放大并淡出
                        this.hitEffectTime -= deltaTime;
                        this.scale = 1.5 + (1 - this.hitEffectTime / 200) * 2;
                        this.opacity = this.hitEffectTime / 200;
                        break;
                        
                    case NoteState.MISSED:
                    case NoteState.FADING:
                        // 淡出消失
                        this.opacity = Math.max(0, this.opacity - deltaTime / 300);
                        this.scale *= 0.95;
                        break;
                }
            }

            /**
             * 更新位置坐标
             */
            updatePosition(center) {
                this.x = center.x + Math.cos(this.angle) * this.currentRadius;
                this.y = center.y + Math.sin(this.angle) * this.currentRadius;
            }

            /**
             * 尝试击中
             * @param {number} audioTime - 当前音频时间
             * @returns {boolean} 是否成功击中
             */
            tryHit(audioTime) {
                if (this.state !== NoteState.ACTIVE) {
                    return false;
                }
                
                const timeDiff = Math.abs(audioTime - this.beatTime) * 1000;
                
                if (timeDiff <= CONSTANTS.ACTIVE_WINDOW_START) {
                    this.hit(audioTime);
                    return true;
                }
                
                return false;
            }

            /**
             * 击中处理
             */
            hit(audioTime) {
                this.state = NoteState.HIT;
                this.stateStartTime = audioTime;
                this.hitEffectTime = 200;  // 击中效果持续200ms
                console.log(`[RhythmNote #${this.index}] ✅ 命中! timeDiff=${((audioTime - this.beatTime) * 1000).toFixed(1)}ms`);
                
                // 触发回调
                if (window.onNoteHit) {
                    window.onNoteHit(this, audioTime);
                }
            }

            /**
             * 错过处理
             */
            miss(audioTime) {
                this.state = NoteState.MISSED;
                this.stateStartTime = audioTime;
                console.log(`[RhythmNote #${this.index}] ❌ 错过`);
                
                // 触发回调
                if (window.onNoteMiss) {
                    window.onNoteMiss(this, audioTime);
                }
            }

            /**
             * 判断是否可以移除
             */
            canRemove() {
                return (this.state === NoteState.FADING || this.state === NoteState.HIT) && 
                       this.opacity <= 0.01;
            }

            /**
             * 渲染节奏点
             * @param {CanvasRenderingContext2D} ctx
             */
            render(ctx) {
                if (this.opacity <= 0 || this.scale <= 0) return;
                
                ctx.save();
                ctx.globalAlpha = this.opacity;
                
                // 获取颜色
                const color = this.getCurrentColor();
                
                // 外发光效果
                if (this.state === NoteState.ACTIVE || this.state === NoteState.SPAWNING) {
                    ctx.shadowBlur = 20 * this.scale;
                    ctx.shadowColor = `rgba(${color.r}, ${color.g}, ${color.b}, 0.8)`;
                }
                
                // 绘制主圆
                ctx.beginPath();
                ctx.arc(this.x, this.y, CONSTANTS.NOTE_RADIUS * this.scale, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${color.a})`;
                ctx.fill();
                
                // 绘制边框
                ctx.strokeStyle = `rgba(255, 255, 255, ${color.a * 0.8})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 绘制内部装饰
                if (this.state === NoteState.ACTIVE) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, CONSTANTS.NOTE_RADIUS * this.scale * 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, 0.3)`;
                    ctx.fill();
                }
                
                // 绘制序号（调试用）
                if (rhythmRenderer && rhythmRenderer.debugMode) {
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.index + 1, this.x, this.y);
                }
                
                ctx.restore();
            }

            /**
             * 获取当前状态对应的颜色
             */
            getCurrentColor() {
                switch (this.state) {
                    case NoteState.PENDING:
                        return CONSTANTS.COLORS.PENDING;
                    case NoteState.SPAWNING:
                        return CONSTANTS.COLORS.ACTIVE;
                    case NoteState.ACTIVE:
                        return CONSTANTS.COLORS.ACTIVE;
                    case NoteState.HIT:
                        return CONSTANTS.COLORS.HIT;
                    case NoteState.MISSED:
                        return CONSTANTS.COLORS.MISSED;
                    case NoteState.FADING:
                        return this.state === NoteState.MISSED ? 
                               CONSTANTS.COLORS.MISSED : CONSTANTS.COLORS.HIT;
                    default:
                        return CONSTANTS.COLORS.PENDING;
                }
            }
        }

        // ==================== 节奏渲染器类 ====================
        class RhythmRenderer {
            constructor() {
                // 画布元素
                this.canvas = document.getElementById('rhythm-layer');
                this.ctx = this.canvas.getContext('2d');
                this.uiCanvas = document.getElementById('ui-layer');
                this.uiCtx = this.uiCanvas.getContext('2d');
                
                // 音频元素
                this.audioPlayer = document.getElementById('audio-player');
                
                // 节奏点管理
                this.notes = [];                    // 所有节奏点
                this.beatList = [];                 // 节拍时间戳列表
                this.nextSpawnIndex = 0;            // 下一个要生成的节拍索引
                
                // 渲染状态
                this.isRunning = false;
                this.debugMode = false;
                this.lastFrameTime = 0;
                this.fps = 0;
                
                // 画布尺寸
                this.width = 0;
                this.height = 0;
                this.center = { x: 0, y: 0 };
                
                // 游戏状态
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                
                // 初始化
                this.init();
            }

            /**
             * 初始化
             */
            init() {
                this.setupCanvas();
                this.setupEventListeners();
                window.addEventListener('resize', () => this.setupCanvas());
                console.log('[RhythmRenderer] 初始化完成');
            }

            /**
             * 设置画布尺寸
             */
            setupCanvas() {
                const wrapper = document.getElementById('canvas-wrapper');
                const rect = wrapper.getBoundingClientRect();
                
                this.width = rect.width;
                this.height = rect.height;
                this.center = { x: this.width / 2, y: this.height / 2 };
                
                // 设置所有画布尺寸
                ['bg-layer', 'rhythm-layer', 'ui-layer'].forEach(id => {
                    const canvas = document.getElementById(id);
                    canvas.width = this.width;
                    canvas.height = this.height;
                });
                
                // 绘制背景
                this.drawBackground();
            }

            /**
             * 绘制静态背景
             */
            drawBackground() {
                const bgCanvas = document.getElementById('bg-layer');
                const ctx = bgCanvas.getContext('2d');
                
                // 径向渐变背景
                const gradient = ctx.createRadialGradient(
                    this.center.x, this.center.y, 0,
                    this.center.x, this.center.y, Math.max(this.width, this.height) / 2
                );
                gradient.addColorStop(0, '#1a1a4e');
                gradient.addColorStop(1, '#0a0a1e');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, this.width, this.height);
                
                // 绘制网格线
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.lineWidth = 1;
                
                // 同心圆
                for (let r = 100; r < Math.max(this.width, this.height) / 2; r += 100) {
                    ctx.beginPath();
                    ctx.arc(this.center.x, this.center.y, r, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                // 射线
                for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 8) {
                    ctx.beginPath();
                    ctx.moveTo(this.center.x, this.center.y);
                    ctx.lineTo(
                        this.center.x + Math.cos(angle) * Math.max(this.width, this.height),
                        this.center.y + Math.sin(angle) * Math.max(this.height, this.height)
                    );
                    ctx.stroke();
                }
            }

            /**
             * 加载节拍数据
             * @param {Object} beatData - { bpm, beatList, duration }
             */
            loadBeatData(beatData) {
                this.beatList = beatData.beatList || [];
                this.nextSpawnIndex = 0;
                this.notes = [];
                
                console.log(`[RhythmRenderer] 加载节拍数据: ${this.beatList.length} 个节拍`);
                
                // 显示开始提示
                document.getElementById('start-hint').classList.add('hidden');
            }

            /**
             * 开始渲染循环
             */
            start() {
                if (this.isRunning) return;
                this.isRunning = true;
                this.lastFrameTime = performance.now();
                this.renderLoop();
                console.log('[RhythmRenderer] 渲染循环开始');
            }

            /**
             * 停止渲染循环
             */
            stop() {
                this.isRunning = false;
                console.log('[RhythmRenderer] 渲染循环停止');
            }

            /**
             * 主渲染循环
             */
            renderLoop() {
                if (!this.isRunning) return;
                
                const currentTime = performance.now();
                const deltaTime = currentTime - this.lastFrameTime;
                this.lastFrameTime = currentTime;
                
                // 计算 FPS
                this.fps = Math.round(1000 / deltaTime);
                
                // 获取音频当前时间（唯一时间基准）
                const audioTime = this.audioPlayer.currentTime;
                
                // 预生成节奏点
                this.spawnNotes(audioTime);
                
                // 更新所有节奏点
                this.updateNotes(audioTime, deltaTime);
                
                // 清空画布
                this.ctx.clearRect(0, 0, this.width, this.height);
                this.uiCtx.clearRect(0, 0, this.width, this.height);
                
                // 渲染节奏点
                this.renderNotes();
                
                // 渲染UI
                this.renderUI();
                
                // 更新调试信息
                if (this.debugMode) {
                    this.updateDebugInfo(audioTime);
                }
                
                requestAnimationFrame(() => this.renderLoop());
            }

            /**
             * 预生成节奏点
             */
            spawnNotes(audioTime) {
                const preGenerateSec = CONSTANTS.PRE_GENERATE_TIME / 1000;
                
                while (this.nextSpawnIndex < this.beatList.length) {
                    const beatTime = this.beatList[this.nextSpawnIndex];
                    
                    // 如果节拍时间大于当前时间 + 预生成时间，则停止生成
                    if (beatTime > audioTime + preGenerateSec) {
                        break;
                    }
                    
                    // 计算发射角度（从中心放射状分布）
                    // 使用索引计算角度，每8个方向循环，添加随机偏移
                    const baseAngle = (this.nextSpawnIndex % 8) * (Math.PI / 4);
                    const randomOffset = (Math.random() - 0.5) * 0.3; // ±0.3 弧度偏移
                    const angle = baseAngle + randomOffset;
                    
                    // 创建节奏点
                    const note = new RhythmNote(beatTime, this.nextSpawnIndex, angle);
                    this.notes.push(note);
                    
                    console.log(`[RhythmRenderer] 生成节奏点 #${this.nextSpawnIndex}: beatTime=${beatTime.toFixed(3)}s`);
                    
                    this.nextSpawnIndex++;
                }
            }

            /**
             * 更新所有节奏点
             */
            updateNotes(audioTime, deltaTime) {
                for (let i = this.notes.length - 1; i >= 0; i--) {
                    const note = this.notes[i];
                    note.update(audioTime, deltaTime, this.center);
                    
                    // 移除已消失的节奏点
                    if (note.canRemove()) {
                        console.log(`[RhythmRenderer] 移除节奏点 #${note.index}`);
                        this.notes.splice(i, 1);
                    }
                }
            }

            /**
             * 渲染所有节奏点
             */
            renderNotes() {
                // 按半径排序，先画远的
                const sortedNotes = [...this.notes].sort((a, b) => b.currentRadius - a.currentRadius);
                
                for (const note of sortedNotes) {
                    note.render(this.ctx);
                }
            }

            /**
             * 渲染UI
             */
            renderUI() {
                // 击中效果文字
                for (const note of this.notes) {
                    if (note.state === NoteState.HIT && note.hitEffectTime > 0) {
                        this.uiCtx.save();
                        this.uiCtx.fillStyle = '#0f0';
                        this.uiCtx.font = 'bold 24px Arial';
                        this.uiCtx.textAlign = 'center';
                        this.uiCtx.fillText('PERFECT!', note.x, note.y - 50);
                        this.uiCtx.restore();
                    } else if (note.state === NoteState.MISSED) {
                        this.uiCtx.save();
                        this.uiCtx.fillStyle = '#f00';
                        this.uiCtx.font = 'bold 20px Arial';
                        this.uiCtx.textAlign = 'center';
                        this.uiCtx.fillText('MISS', note.x, note.y - 30);
                        this.uiCtx.restore();
                    }
                }
            }

            /**
             * 更新调试信息
             */
            updateDebugInfo(audioTime) {
                document.getElementById('fps').textContent = this.fps;
                document.getElementById('audio-time').textContent = audioTime.toFixed(3);
                document.getElementById('active-notes').textContent = this.notes.length;
                
                // 下一个节拍信息
                if (this.nextSpawnIndex < this.beatList.length) {
                    const nextBeat = this.beatList[this.nextSpawnIndex];
                    const timeToNext = (nextBeat - audioTime) * 1000;
                    document.getElementById('next-beat').textContent = 
                        `${nextBeat.toFixed(2)}s (${timeToNext.toFixed(0)}ms)`;
                } else {
                    document.getElementById('next-beat').textContent = '无';
                }
                
                // 最近的命中窗口
                let nearestWindow = Infinity;
                for (const note of this.notes) {
                    if (note.state === NoteState.ACTIVE) {
                        const window = Math.abs(audioTime - note.beatTime) * 1000;
                        if (window < nearestWindow) {
                            nearestWindow = window;
                        }
                    }
                }
                document.getElementById('hit-window').textContent = 
                    nearestWindow === Infinity ? '--' : nearestWindow.toFixed(1);
            }

            /**
             * 尝试击中节奏点
             */
            tryHit() {
                const audioTime = this.audioPlayer.currentTime;
                let hitNote = null;
                let minTimeDiff = Infinity;
                
                // 找到在可击中窗口内的节奏点
                for (const note of this.notes) {
                    if (note.state === NoteState.ACTIVE) {
                        const timeDiff = Math.abs(audioTime - note.beatTime);
                        if (timeDiff < minTimeDiff) {
                            minTimeDiff = timeDiff;
                            hitNote = note;
                        }
                    }
                }
                
                // 尝试击中
                if (hitNote && hitNote.tryHit(audioTime)) {
                    this.onHit(hitNote, minTimeDiff);
                    return true;
                }
                
                console.log('[RhythmRenderer] 未命中任何节奏点');
                return false;
            }

            /**
             * 击中回调
             */
            onHit(note, timeDiff) {
                this.combo++;
                this.maxCombo = Math.max(this.maxCombo, this.combo);
                
                // 根据准确度计算分数
                const accuracy = 1 - (timeDiff / (CONSTANTS.ACTIVE_WINDOW_START / 1000));
                const points = Math.round(100 * accuracy + this.combo * 10);
                this.score += points;
                
                // 更新UI
                document.getElementById('score').textContent = this.score;
                document.getElementById('combo').textContent = `Combo: ${this.combo}`;
                
                console.log(`[RhythmRenderer] ✅ 命中! 准确度=${(accuracy * 100).toFixed(1)}%, 分数=${points}, 连击=${this.combo}`);
            }

            /**
             * 错过回调
             */
            onMiss(note) {
                this.combo = 0;
                document.getElementById('combo').textContent = `Combo: ${this.combo}`;
                console.log(`[RhythmRenderer] ❌ 错过节奏点 #${note.index}`);
            }

            /**
             * 切换调试模式
             */
            toggleDebug() {
                this.debugMode = !this.debugMode;
                document.getElementById('debug-info').classList.toggle('hidden');
                console.log(`[RhythmRenderer] 调试模式: ${this.debugMode ? '开启' : '关闭'}`);
            }

            /**
             * 设置事件监听
             */
            setupEventListeners() {
                // 键盘控制
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.tryHit();
                    } else if (e.code === 'KeyD') {
                        this.toggleDebug();
                    }
                });
                
                // 鼠标/触摸点击
                this.canvas.addEventListener('mousedown', () => this.tryHit());
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.tryHit();
                });
            }
        }

        // ==================== 全局回调接口 ====================

        /**
         * 节奏点命中回调（供外部模块调用，如手部识别）
         * @param {RhythmNote} note - 命中的节奏点
         * @param {number} audioTime - 命中时的音频时间
         */
        window.onNoteHit = function(note, audioTime) {
            console.log(`[Callback] onNoteHit called: note #${note.index} at ${audioTime.toFixed(3)}s`);
            // 这里可以接入手部识别、碰撞检测等外部逻辑
        };

        /**
         * 节奏点错过回调
         * @param {RhythmNote} note - 错过的节奏点
         * @param {number} audioTime - 错过时的音频时间
         */
        window.onNoteMiss = function(note, audioTime) {
            console.log(`[Callback] onNoteMiss called: note #${note.index} at ${audioTime.toFixed(3)}s`);
            // 处理错过逻辑
        };

        // ==================== 全局变量和函数 ====================
        let rhythmRenderer;
        let beatData = null;

        /**
         * 加载节拍数据文件
         */
        function loadBeatData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    beatData = JSON.parse(e.target.result);
                    console.log('[Main] 节拍数据加载成功:', beatData);
                    
                    // 加载到渲染器
                    rhythmRenderer.loadBeatData(beatData);
                    
                    // 启用播放按钮
                    document.getElementById('play-btn').disabled = !document.getElementById('audio-player').src;
                    
                    alert(`成功加载 ${beatData.beatList.length} 个节拍点`);
                } catch (err) {
                    alert('加载失败: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        /**
         * 音频上传处理
         */
        document.getElementById('audio-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const audioPlayer = document.getElementById('audio-player');
            audioPlayer.src = url;
            
            document.getElementById('audio-info').textContent = file.name;
            document.getElementById('play-btn').disabled = !beatData;
            
            console.log('[Main] 音频加载:', file.name);
        });

        /**
         * 播放/暂停切换
         */
        function togglePlay() {
            const audioPlayer = document.getElementById('audio-player');
            const btn = document.getElementById('play-btn');
            
            if (audioPlayer.paused) {
                audioPlayer.play();
                btn.textContent = '⏸ 暂停';
                rhythmRenderer.start();
            } else {
                audioPlayer.pause();
                btn.textContent = '▶ 播放';
                rhythmRenderer.stop();
            }
        }

        /**
         * 模拟击中（测试用）
         */
        function simulateHit() {
            rhythmRenderer.tryHit();
        }

        // 音频播放结束处理
        document.getElementById('audio-player').addEventListener('ended', function() {
            document.getElementById('play-btn').textContent = '▶ 播放';
            rhythmRenderer.stop();
        });

        // ==================== 初始化 ====================
        window.addEventListener('DOMContentLoaded', () => {
            rhythmRenderer = new RhythmRenderer();
            console.log('[Main] BeatTouch 节奏渲染器已加载');
            console.log('[Main] 操作说明:');
            console.log('  - 空格键/点击: 击中节奏点');
            console.log('  - D键: 切换调试模式');
            console.log('  - 先上传音乐，再导入打点JSON');
        });
    </script>
</body>

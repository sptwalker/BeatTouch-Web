<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatTouch - 节奏渲染器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MediaPipe Hands 手部追踪 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* 游戏容器 - 16:9 比例 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        
        #canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 177.78vh; /* 16:9 */
            max-height: 56.25vw; /* 9/16 */
        }
        
        /* 分层画布 */
        .game-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #bg-layer {
            z-index: 1;
            background: radial-gradient(ellipse at center, #1a1a4e 0%, #0a0a1e 100%);
        }
        
        #camera-layer {
            z-index: 2;
            opacity: 0.3;
            object-fit: cover;
        }
        
        #rhythm-layer {
            z-index: 3;
        }
        
        #ui-layer {
            z-index: 4;
            pointer-events: none;
        }
        
        /* 命中区域指示器 - 中心大圆 */
        #hit-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;  /* CENTER_CIRCLE_RADIUS * 2 = 400 * 2 */
            height: 800px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }
        
        #hit-zone::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        /* 分数显示 */
        #score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            z-index: 5;
        }
        
        .score-value {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
        }
        
        .combo-value {
            font-size: 24px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
        
        /* 控制面板 - 右下角 */
        #control-panel {
            position: fixed;
            bottom: 20px;
            right: 200px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .control-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .control-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
        
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        #beat-data-input {
            display: none;
        }
        
        /* 调试信息 - 右下角 */
        #debug-info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #0f0;
            max-width: 300px;
        }
        
        /* 设置面板 - 左下角（播放前显示） */
        #setup-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 8px;
            align-items: center;
            max-width: 520px;
            flex-wrap: wrap;
            transition: all 0.3s;
        }
        
        /* 播放控制栏 - 顶部居中（播放后显示） */
        #playback-bar {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 10px;
            align-items: center;
            transition: all 0.3s;
        }
        
        #playback-bar.hidden { display: none !important; }
        
        #playback-bar .song-name {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .bar-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .bar-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.5);
        }
        
        #audio-upload {
            display: none;
        }
        
        .upload-label {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: white;
            transition: all 0.3s;
        }
        
        .upload-label:hover {
            transform: scale(1.05);
        }
        
        #audio-player {
            display: none;
        }
        
        /* 开始提示 */
        #start-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            text-align: center;
            color: white;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 摄像头状态指示 */
        #camera-status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 101;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #888;
            display: none;
            align-items: center;
            gap: 6px;
        }
        #camera-status .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #f44;
            display: inline-block;
        }
        #camera-status.active .dot { background: #4f4; }
        #camera-status.active { color: #aaa; }
    </style>
</head>
<body>
    <!-- 音频元素 -->
    <audio id="audio-player" crossorigin="anonymous"></audio>
    
    <!-- 设置面板（播放前显示） -->
    <div id="setup-panel">
        <!-- 预设打点数据选择 -->
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="color: #888; font-size: 11px;">📁 选择预设打点数据</label>
            <select id="preset-beat-select" onchange="loadPresetBeatData(this)" style="padding: 8px 12px; border-radius: 6px; background: #222; color: #fff; border: 1px solid #444; font-size: 13px; min-width: 180px;">
                <option value="">-- 选择歌曲 --</option>
                <option value="music-point/beat-data-1775487199028(水手).json">🎵 水手</option>
                <option value="music-point/beat-data-1775487496502(铿锵玫瑰).json">🎵 铿锵玫瑰</option>
                <option value="music-point/beat-data-1775487593590(怒放的生命).json">🎵 怒放的生命</option>
                <option value="music-point/beat-data-1775487621295(光辉岁月).json">🎵 光辉岁月</option>
                <option value="music-point/beat-data-1775488995886(七十二变).json">🎵 七十二变</option>
            </select>
        </div>
        
        <div style="width: 1px; height: 40px; background: #444; margin: 0 10px;"></div>
        
        <!-- 音频上传 -->
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="color: #888; font-size: 11px;">🎵 上传对应音乐</label>
            <label class="upload-label" style="margin: 0;">
                <input type="file" id="audio-upload" accept="audio/mp3,audio/*">
                选择 MP3
            </label>
        </div>
        
        <div style="width: 1px; height: 40px; background: #444; margin: 0 10px;"></div>
        
        <!-- 或自定义导入 -->
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="color: #888; font-size: 11px;">📂 或导入自定义JSON</label>
            <label class="upload-label" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0;">
                <input type="file" id="beat-file-input" accept=".json" onchange="loadBeatData(this)">
                导入JSON
            </label>
        </div>
        
        <div style="width: 1px; height: 40px; background: #444; margin: 0 10px;"></div>
        
        <button class="control-btn" onclick="togglePlay()" id="play-btn" disabled>▶ 播放</button>
        <span id="audio-info" style="color: #888; font-size: 12px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">未加载音频</span>
    </div>
    
    <!-- 播放控制栏（播放后显示） -->
    <div id="playback-bar" class="hidden">
        <span class="song-name" id="bar-song-name">--</span>
        <button class="bar-btn" id="bar-play-btn" onclick="togglePlay()" title="播放/暂停">⏸</button>
        <button class="bar-btn" onclick="stopAndReset()" title="退出" style="color:#f66;">✕</button>
    </div>
    
    <!-- 控制面板 -->
    <div id="control-panel">
        <div style="color: #fff; font-size: 14px; margin-bottom: 10px;">🎮 节奏渲染器</div>
        <button class="control-btn" onclick="rhythmRenderer.toggleDebug()">调试模式</button>
        <button class="control-btn" onclick="simulateHit()">模拟击中</button>
        <div style="margin-top: 10px; color: #888; font-size: 12px;">
            点击/空格: 击中<br>
            调试: D键<br>
            摄像头: 播放自动开启
        </div>
    </div>
    
    <!-- 分数显示 -->
    <div id="score-display">
        <div class="score-value" id="score">0</div>
        <div class="combo-value" id="combo">Combo: 0</div>
    </div>
    
    <!-- 游戏容器 -->
    <div id="game-container">
        <div id="canvas-wrapper">
            <!-- 背景层 -->
            <canvas id="bg-layer" class="game-layer"></canvas>
            
            <!-- 摄像头背景层（预留） -->
            <video id="camera-layer" class="game-layer" autoplay playsinline muted></video>
            
            <!-- 命中区域 -->
            <div id="hit-zone"></div>
            
            <!-- 节奏图案层 -->
            <canvas id="rhythm-layer" class="game-layer"></canvas>
            
            <!-- UI层 -->
            <canvas id="ui-layer" class="game-layer"></canvas>
            
            <!-- 手势光标层 -->
            <canvas id="hand-layer" class="game-layer" style="z-index: 5; pointer-events: none;"></canvas>
        </div>
    </div>
    
    <!-- 开始提示 -->
    <div id="start-hint">
        <div>🎮 准备开始游戏</div>
        <div style="font-size: 16px; color: #888; margin-top: 10px;">
            1. 从左下角选择预设打点数据 或导入自定义 JSON<br>
            2. 上传对应的 MP3 音乐文件<br>
            3. 点击播放开始游戏！
        </div>
    </div>
    
    <!-- 调试信息 -->
    <div id="debug-info" class="hidden">
        <div>FPS: <span id="fps">0</span></div>
        <div>Audio Time: <span id="audio-time">0.000</span>s</div>
        <div>Active Notes: <span id="active-notes">0</span></div>
        <div>Next Beat: <span id="next-beat">--</span></div>
        <div>Hit Window: <span id="hit-window">--</span>ms</div>
    </div>
    
    <!-- 摄像头状态 -->
    <div id="camera-status"><span class="dot"></span><span id="camera-status-text">摄像头未启动</span></div>

    <script>
        /**
         * ============================================
         * BeatTouch 节奏图案渲染模块
         * ============================================
         * 核心功能：
         * - Canvas 2D 渲染，16:9 自适应
         * - 基于 audio.currentTime 的时间同步
         * - 节奏点状态机管理
         * - 放射状运动 + 呼吸动画
         * - 预留命中/错过回调接口
         */

        // ==================== 常量定义 ====================
        const CONSTANTS = {
            // 画布比例
            ASPECT_RATIO: 16 / 9,
            
            // 时间参数（毫秒）- 更长存在时间，更慢速度
            PRE_GENERATE_TIME: 4500,     // 节拍前预生成时间（4.5秒，更长的运动时间）
            ACTIVE_WINDOW_START: 350,    // 可击中窗口开始（节拍前）
            ACTIVE_WINDOW_END: 350,      // 可击中窗口结束（节拍后）
            MISS_THRESHOLD: 1200,        // 过期阈值（节拍后，更长）
            
            // 节奏点参数 - 从圆心向外运动
            CENTER_CIRCLE_RADIUS: 400,   // 中心大圆半径（最佳点击位置）
            NOTE_START_RADIUS: 0,        // 起始半径（从圆心开始）
            NOTE_END_RADIUS: 520,        // 结束半径（超出中心圆后消失）
            NOTE_RADIUS: 28,             // 节奏点圆形半径
            NOTE_LIFETIME: 4500,         // 总生命周期（ms，延长到4.5秒）
            
            // 轨道参数
            TRACK_COUNT: 8,              // 8条放射性轨道
            TRACK_WIDTH: 3,              // 轨道线宽
            // 轨道角度（22.5°起，间隔45°）
            TRACK_ANGLES: [
                22.5, 67.5, 112.5, 157.5, 202.5, 247.5, 292.5, 337.5
            ].map(deg => deg * Math.PI / 180),
            
            // 运动速度控制 - 更慢
            MOVE_SPEED: 0.02,            // 运动速度系数（越小越慢）
            
            // 视觉效果
            BREATH_MIN_SCALE: 0.95,      // 呼吸最小缩放
            BREATH_MAX_SCALE: 1.05,      // 呼吸最大缩放
            BREATH_SPEED: 0.002,         // 呼吸速度（减慢）
            
            // 颜色配置 - 渐变颜色定义
            COLORS: {
                PENDING: { r: 100, g: 100, b: 100, a: 0.3 },    // 待触发 - 灰色
                SPAWNING: { r: 150, g: 150, b: 150, a: 0.6 },   // 生成中 - 浅灰
                // 可击中状态颜色渐变：淡黄 -> 深黄 -> 橙 -> 红
                ACTIVE_START: { r: 255, g: 255, b: 150, a: 1 },    // 刚到达圆周 - 淡黄色
                ACTIVE_MID: { r: 255, g: 200, b: 50, a: 1 },       // 中间 - 金黄色
                ACTIVE_END: { r: 255, g: 80, b: 50, a: 1 },        // 即将过期 - 橙红色
                HIT: { r: 50, g: 255, b: 100, a: 1 },              // 已击中 - 亮绿色
                MISSED: { r: 255, g: 50, b: 50, a: 0.3 }           // 已过期 - 淡红色
            }
        };

        // ==================== 节奏点状态枚举 ====================
        const NoteState = {
            PENDING: 'pending',     // 预生成，未显示
            SPAWNING: 'spawning',   // 渐入动画中
            ACTIVE: 'active',       // 可击中状态
            HIT: 'hit',            // 已击中
            MISSED: 'missed',      // 已错过/过期
            FADING: 'fading'       // 消失动画中
        };

        // ==================== 节奏点类 ====================
        class RhythmNote {
            /**
             * @param {number} beatTime - 节拍时间戳（秒）
             * @param {number} index - 节拍索引
             * @param {number} angle - 发射角度（弧度）
             * @param {boolean} isLeftSide - 是否在左侧（用于对称生成）
             */
            constructor(beatTime, index, angle, isLeftSide = true) {
                this.beatTime = beatTime;           // 目标节拍时间
                this.index = index;                  // 节拍序号
                this.angle = angle;                  // 运动角度
                this.isLeftSide = isLeftSide;        // 是否在左侧
                
                // 状态管理
                this.state = NoteState.PENDING;
                this.stateStartTime = 0;             // 当前状态开始时间
                
                // 位置计算 - 从圆心开始向外运动
                this.currentRadius = CONSTANTS.NOTE_START_RADIUS;  // 从0开始
                this.x = 0;
                this.y = 0;
                
                // 目标：在节拍时刻到达中心圆周
                this.targetRadius = CONSTANTS.CENTER_CIRCLE_RADIUS;
                
                // 视觉效果
                this.scale = 0;                      // 当前缩放（渐入用）
                this.targetScale = 1;
                this.breathPhase = Math.random() * Math.PI * 2;  // 呼吸相位
                this.opacity = 0;
                
                // 击中效果
                this.hitEffectTime = 0;              // 击中效果剩余时间
                
                console.log(`[RhythmNote #${index}] 创建: beatTime=${beatTime.toFixed(3)}s, angle=${(angle * 180 / Math.PI).toFixed(1)}°, ${isLeftSide ? '左侧' : '右侧'}`);
            }

            /**
             * 更新节奏点状态
             * @param {number} audioTime - 当前音频播放时间（秒）
             * @param {number} deltaTime - 帧间隔（毫秒）
             * @param {Object} center - 画布中心点 {x, y}
             */
            update(audioTime, deltaTime, center) {
                const timeToBeat = (this.beatTime - audioTime) * 1000;  // 距离节拍的时间（毫秒，正数表示还没到）
                
                // 状态机转换
                this.updateState(timeToBeat, audioTime);
                
                // 根据状态更新视觉效果
                this.updateVisuals(timeToBeat, deltaTime);
                
                // 更新位置 - 从圆心向外运动
                this.updatePosition(center, timeToBeat, deltaTime);
                
                // 自动过期检测
                if (this.state === NoteState.ACTIVE && timeToBeat < -CONSTANTS.MISS_THRESHOLD) {
                    this.miss(audioTime);
                }
            }

            /**
             * 更新状态机
             */
            updateState(timeToBeat, audioTime) {
                const prevState = this.state;
                
                // 计算节奏点当前应该在的位置（相对于中心圆的进度）
                // 0 = 圆心, 1 = 正好在中心圆周上（节拍时刻）
                const totalTime = CONSTANTS.PRE_GENERATE_TIME + CONSTANTS.ACTIVE_WINDOW_END;
                const progress = 1 - (timeToBeat + CONSTANTS.ACTIVE_WINDOW_END) / totalTime;
                const normalizedProgress = Math.max(0, Math.min(1, progress));
                
                switch (this.state) {
                    case NoteState.PENDING:
                        // 到达预生成时间点，开始渐入
                        if (timeToBeat <= CONSTANTS.PRE_GENERATE_TIME) {
                            this.state = NoteState.SPAWNING;
                            this.stateStartTime = audioTime;
                        }
                        break;
                        
                    case NoteState.SPAWNING:
                        // 到达中心圆周附近时进入可击中状态
                        if (normalizedProgress >= 0.85) {  // 接近中心圆
                            this.state = NoteState.ACTIVE;
                            this.stateStartTime = audioTime;
                            console.log(`[RhythmNote #${this.index}] 🎯 进入可击中状态`);
                        }
                        break;
                        
                    case NoteState.ACTIVE:
                        // 保持在可击中状态，等待命中或过期
                        // 如果已经远离中心圆，自动标记为错过
                        if (normalizedProgress > 1.1) {
                            this.state = NoteState.MISSED;
                            this.stateStartTime = audioTime;
                        }
                        break;
                        
                    case NoteState.HIT:
                        // 击中后进入消失动画
                        if (this.hitEffectTime <= 0) {
                            this.state = NoteState.FADING;
                            this.stateStartTime = audioTime;
                        }
                        break;
                        
                    case NoteState.MISSED:
                        // 错过后的消失
                        this.state = NoteState.FADING;
                        this.stateStartTime = audioTime;
                        break;
                        
                    case NoteState.FADING:
                        // 完全消失后可以移除
                        break;
                }
                
                if (prevState !== this.state) {
                    console.log(`[RhythmNote #${this.index}] 状态变更: ${prevState} → ${this.state}`);
                }
            }

            /**
             * 更新视觉效果
             */
            updateVisuals(timeToBeat, deltaTime) {
                // 呼吸动画
                this.breathPhase += CONSTANTS.BREATH_SPEED * deltaTime;
                const breathScale = (Math.sin(this.breathPhase) + 1) / 2;  // 0~1
                
                // 计算整体进度 (0 = 刚生成, 1 = 正好在节拍时刻)
                const totalTime = CONSTANTS.PRE_GENERATE_TIME + CONSTANTS.ACTIVE_WINDOW_END;
                const progress = 1 - (timeToBeat + CONSTANTS.ACTIVE_WINDOW_END) / totalTime;
                const normalizedProgress = Math.max(0, Math.min(1, progress));
                
                switch (this.state) {
                    case NoteState.PENDING:
                        this.opacity = 0;
                        this.scale = 0;
                        break;
                        
                    case NoteState.SPAWNING:
                        // 渐入动画 - 从圆心缓慢出现并向外移动
                        this.opacity = Math.min(1, normalizedProgress * 3);  // 快速淡入
                        this.scale = 0.5 + normalizedProgress * 0.5;  // 从小到大
                        break;
                        
                    case NoteState.ACTIVE:
                        // 可击中状态：颜色逐渐加深，面积逐渐扩大
                        // timeToBeat: 正数=还没到节拍, 负数=已过节拍
                        // 进入ACTIVE时 timeToBeat 约 +350ms，过期时约 -1200ms
                        const activeTotal = CONSTANTS.ACTIVE_WINDOW_START + CONSTANTS.MISS_THRESHOLD;
                        const activeProgress = Math.min(1, Math.max(0, 
                            (CONSTANTS.ACTIVE_WINDOW_START - timeToBeat) / activeTotal));
                        
                        this.opacity = 1;
                        // 面积从 1.0 逐渐扩大到 1.6，加上轻微呼吸
                        this.scale = (1.0 + activeProgress * 0.6) + breathScale * 0.05;
                        break;
                        
                    case NoteState.HIT:
                        // 击中效果：闪烁亮绿色，快速扩大变淡消失
                        this.hitEffectTime -= deltaTime;
                        // 快速扩大：1.5倍 -> 4倍
                        const hitProgress = 1 - this.hitEffectTime / 300;
                        this.scale = 1.2 + hitProgress * 3;  // 1.2 -> 4.2
                        // 快速淡出
                        this.opacity = Math.max(0, this.hitEffectTime / 300);
                        break;
                        
                    case NoteState.MISSED:
                    case NoteState.FADING:
                        // 淡出消失
                        this.opacity = Math.max(0, this.opacity - deltaTime / 400);
                        this.scale *= 0.98;
                        break;
                }
            }

            /**
             * 更新位置坐标 - 从圆心向外运动
             * 在节拍时刻正好到达中心圆周
             */
            updatePosition(center, timeToBeat, deltaTime) {
                // 计算应该移动到的半径位置
                // 0% 时间 = 圆心 (半径 0)
                // 100% 时间 = 中心圆周 (半径 CENTER_CIRCLE_RADIUS)
                const totalTime = CONSTANTS.PRE_GENERATE_TIME + CONSTANTS.ACTIVE_WINDOW_END;
                const progress = 1 - (timeToBeat + CONSTANTS.ACTIVE_WINDOW_END) / totalTime;
                const normalizedProgress = Math.max(0, Math.min(1.2, progress));  // 允许稍微超出
                
                // 使用缓动函数让运动更平滑
                const easedProgress = this.easeOutCubic(normalizedProgress);
                
                // 计算当前半径 - 从0到目标半径
                this.currentRadius = this.targetRadius * easedProgress;
                
                // 计算坐标
                this.x = center.x + Math.cos(this.angle) * this.currentRadius;
                this.y = center.y + Math.sin(this.angle) * this.currentRadius;
            }
            
            /**
             * 缓动函数 - easeOutCubic
             */
            easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            /**
             * 尝试击中
             * @param {number} audioTime - 当前音频时间
             * @returns {boolean} 是否成功击中
             */
            tryHit(audioTime) {
                // 只有在可击中状态或接近中心圆时才能击中
                if (this.state !== NoteState.ACTIVE && this.state !== NoteState.SPAWNING) {
                    return false;
                }
                
                // 检查是否在中心圆周附近
                const distFromCenter = Math.abs(this.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                
                // 在中心圆附近或时间窗口内都可以击中
                const timeDiff = Math.abs(audioTime - this.beatTime) * 1000;
                
                if (distFromCenter < 60 || timeDiff <= CONSTANTS.ACTIVE_WINDOW_START) {
                    this.hit(audioTime);
                    return true;
                }
                
                return false;
            }

            /**
             * 击中处理
             */
            hit(audioTime) {
                this.state = NoteState.HIT;
                this.stateStartTime = audioTime;
                this.hitEffectTime = 300;  // 击中效果持续300ms（更长的闪烁效果）
                console.log(`[RhythmNote #${this.index}] ✅ 命中! timeDiff=${((audioTime - this.beatTime) * 1000).toFixed(1)}ms`);
                
                // 触发回调
                if (window.onNoteHit) {
                    window.onNoteHit(this, audioTime);
                }
            }

            /**
             * 错过处理
             */
            miss(audioTime) {
                this.state = NoteState.MISSED;
                this.stateStartTime = audioTime;
                console.log(`[RhythmNote #${this.index}] ❌ 错过`);
                
                // 触发回调
                if (window.onNoteMiss) {
                    window.onNoteMiss(this, audioTime);
                }
            }

            /**
             * 判断是否可以移除
             */
            canRemove() {
                return (this.state === NoteState.FADING || this.state === NoteState.HIT) && 
                       this.opacity <= 0.01;
            }

            /**
             * 渲染节奏点
             * @param {CanvasRenderingContext2D} ctx
             */
            render(ctx) {
                if (this.opacity <= 0 || this.scale <= 0) return;
                
                ctx.save();
                ctx.globalAlpha = this.opacity;
                
                // 获取颜色
                const color = this.getCurrentColor();
                
                // 外发光效果 - 根据状态调整
                if (this.state === NoteState.ACTIVE) {
                    // 可击中状态：黄色/橙色发光，随面积扩大而增强
                    ctx.shadowBlur = 20 + 15 * this.scale;
                    ctx.shadowColor = `rgba(${color.r}, ${color.g}, ${color.b}, 0.9)`;
                } else if (this.state === NoteState.HIT) {
                    // 击中状态：绿色强烈闪烁发光
                    const flashIntensity = 0.8 + Math.sin(this.hitEffectTime * 0.1) * 0.2;
                    ctx.shadowBlur = 40 * this.scale * flashIntensity;
                    ctx.shadowColor = `rgba(50, 255, 100, ${flashIntensity})`;
                } else if (this.state === NoteState.SPAWNING) {
                    ctx.shadowBlur = 15 * this.scale;
                    ctx.shadowColor = `rgba(${color.r}, ${color.g}, ${color.b}, 0.6)`;
                }
                
                // 绘制主圆
                ctx.beginPath();
                ctx.arc(this.x, this.y, CONSTANTS.NOTE_RADIUS * this.scale, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${color.a})`;
                ctx.fill();
                
                // 绘制边框
                if (this.state === NoteState.HIT) {
                    // 击中时白色高亮边框
                    ctx.strokeStyle = `rgba(255, 255, 255, ${color.a})`;
                    ctx.lineWidth = 4;
                } else {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${color.a * 0.8})`;
                    ctx.lineWidth = 3;
                }
                ctx.stroke();
                
                // 绘制内部装饰
                if (this.state === NoteState.ACTIVE) {
                    // 可击中状态：内部高光，随面积扩大而增强
                    const glowAlpha = 0.3 + (this.scale - 1.0) * 0.5;  // scale 越大高光越亮
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, CONSTANTS.NOTE_RADIUS * this.scale * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 200, ${Math.min(0.7, glowAlpha)})`;
                    ctx.fill();
                } else if (this.state === NoteState.HIT) {
                    // 击中状态：中心闪光
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, CONSTANTS.NOTE_RADIUS * this.scale * 0.3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${color.a})`;
                    ctx.fill();
                }
                
                // 绘制序号（调试用）
                if (rhythmRenderer && rhythmRenderer.debugMode) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.index + 1, this.x, this.y);
                }
                
                ctx.restore();
            }

            /**
             * 获取当前状态对应的颜色
             * 可击中状态：淡黄 -> 深黄 -> 橙 -> 红，离开圆周后变淡消失
             */
            getCurrentColor() {
                switch (this.state) {
                    case NoteState.PENDING:
                        return CONSTANTS.COLORS.PENDING;
                        
                    case NoteState.SPAWNING:
                        return { ...CONSTANTS.COLORS.SPAWNING };
                        
                    case NoteState.ACTIVE: {
                        // 颜色渐变：淡黄 -> 金黄 -> 橙红，基于离开中心圆的距离（与时间同步）
                        const distFromCenter = Math.max(0, this.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                        const activeRange = CONSTANTS.NOTE_END_RADIUS - CONSTANTS.CENTER_CIRCLE_RADIUS;
                        const timeProgress = Math.min(1, distFromCenter / activeRange);
                        
                        let startColor, endColor, t;
                        
                        if (timeProgress < 0.5) {
                            startColor = CONSTANTS.COLORS.ACTIVE_START;
                            endColor = CONSTANTS.COLORS.ACTIVE_MID;
                            t = timeProgress * 2;
                        } else {
                            startColor = CONSTANTS.COLORS.ACTIVE_MID;
                            endColor = CONSTANTS.COLORS.ACTIVE_END;
                            t = (timeProgress - 0.5) * 2;
                        }
                        
                        const r = Math.round(startColor.r + (endColor.r - startColor.r) * t);
                        const g = Math.round(startColor.g + (endColor.g - startColor.g) * t);
                        const b = Math.round(startColor.b + (endColor.b - startColor.b) * t);
                        
                        return { r, g, b, a: 1 };
                    }
                        
                    case NoteState.HIT: {
                        // 击中效果：闪烁亮绿色，逐渐变淡
                        const flashIntensity = 1 + Math.sin(this.hitEffectTime * 0.05) * 0.3;  // 闪烁效果
                        return {
                            r: Math.min(255, CONSTANTS.COLORS.HIT.r * flashIntensity),
                            g: Math.min(255, CONSTANTS.COLORS.HIT.g * flashIntensity),
                            b: Math.min(255, CONSTANTS.COLORS.HIT.b * flashIntensity),
                            a: this.hitEffectTime / 200  // 逐渐变淡
                        };
                    }
                        
                    case NoteState.MISSED:
                    case NoteState.FADING: {
                        // 离开圆周后变淡消失
                        const fadeOut = Math.max(0, this.opacity);
                        return {
                            r: CONSTANTS.COLORS.MISSED.r,
                            g: CONSTANTS.COLORS.MISSED.g,
                            b: CONSTANTS.COLORS.MISSED.b,
                            a: fadeOut * 0.5  // 半透明淡出
                        };
                    }
                        
                    default:
                        return CONSTANTS.COLORS.PENDING;
                }
            }
        }

        // ==================== 节奏渲染器类 ====================
        class RhythmRenderer {
            constructor() {
                // 画布元素
                this.canvas = document.getElementById('rhythm-layer');
                this.ctx = this.canvas.getContext('2d');
                this.uiCanvas = document.getElementById('ui-layer');
                this.uiCtx = this.uiCanvas.getContext('2d');
                
                // 音频元素
                this.audioPlayer = document.getElementById('audio-player');
                
                // 节奏点管理
                this.notes = [];                    // 所有节奏点
                this.beatList = [];                 // 节拍时间戳列表
                this.nextSpawnIndex = 0;            // 下一个要生成的节拍索引
                
                // 渲染状态
                this.isRunning = false;
                this.debugMode = false;
                this.lastFrameTime = 0;
                this.fps = 0;
                
                // 画布尺寸
                this.width = 0;
                this.height = 0;
                this.center = { x: 0, y: 0 };
                
                // 游戏状态
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                
                // 圆心波形特效
                this.pulseRings = [];  // 活跃的脉冲环
                this.lastBeatPulseIndex = -1;  // 上次触发脉冲的节拍索引
                this.waveformType = 0;  // 当前波形类型 (0-3)
                this.waveformSwitchTime = 0;  // 上次切换波形的音频时间
                this.waveformRotation = 0;  // 波形旋转角度（用于动画）
                
                // 初始化
                this.init();
            }

            /**
             * 初始化
             */
            init() {
                this.setupCanvas();
                this.setupEventListeners();
                window.addEventListener('resize', () => this.setupCanvas());
                console.log('[RhythmRenderer] 初始化完成');
            }

            /**
             * 设置画布尺寸
             */
            setupCanvas() {
                const wrapper = document.getElementById('canvas-wrapper');
                const rect = wrapper.getBoundingClientRect();
                
                this.width = rect.width;
                this.height = rect.height;
                this.center = { x: this.width / 2, y: this.height / 2 };
                
                // 设置所有画布尺寸
                ['bg-layer', 'rhythm-layer', 'ui-layer', 'hand-layer'].forEach(id => {
                    const canvas = document.getElementById(id);
                    canvas.width = this.width;
                    canvas.height = this.height;
                });
                
                // 绘制背景
                this.drawBackground();
            }

            /**
             * 绘制静态背景 - 包含8条放射性轨道
             */
            drawBackground() {
                const bgCanvas = document.getElementById('bg-layer');
                const ctx = bgCanvas.getContext('2d');
                
                // 径向渐变背景
                const gradient = ctx.createRadialGradient(
                    this.center.x, this.center.y, 0,
                    this.center.x, this.center.y, Math.max(this.width, this.height) / 2
                );
                gradient.addColorStop(0, '#1a1a4e');
                gradient.addColorStop(0.5, '#0f0f2e');
                gradient.addColorStop(1, '#0a0a1e');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, this.width, this.height);
                
                // 绘制8条放射性轨道
                const trackLength = Math.max(this.width, this.height);
                ctx.strokeStyle = 'rgba(100, 150, 255, 0.2)';
                ctx.lineWidth = CONSTANTS.TRACK_WIDTH;
                ctx.setLineDash([5, 5]);  // 虚线轨道
                
                for (let i = 0; i < CONSTANTS.TRACK_COUNT; i++) {
                    const angle = CONSTANTS.TRACK_ANGLES[i];
                    ctx.beginPath();
                    ctx.moveTo(this.center.x, this.center.y);
                    ctx.lineTo(
                        this.center.x + Math.cos(angle) * trackLength,
                        this.center.y + Math.sin(angle) * trackLength
                    );
                    ctx.stroke();
                    
                    // 绘制轨道端点标记
                    const endX = this.center.x + Math.cos(angle) * CONSTANTS.CENTER_CIRCLE_RADIUS;
                    const endY = this.center.y + Math.sin(angle) * CONSTANTS.CENTER_CIRCLE_RADIUS;
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(endX, endY, 6, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(100, 150, 255, 0.4)';
                    ctx.fill();
                    ctx.restore();
                }
                ctx.setLineDash([]);
                
                // 绘制中心目标圆环
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.center.x, this.center.y, CONSTANTS.CENTER_CIRCLE_RADIUS, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 内圈装饰
                ctx.beginPath();
                ctx.arc(this.center.x, this.center.y, CONSTANTS.CENTER_CIRCLE_RADIUS - 15, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.lineWidth = 1;
                ctx.setLineDash([8, 8]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }

            /**
             * 加载节拍数据
             * @param {Object} beatData - { bpm, beatList, duration }
             */
            loadBeatData(beatData) {
                this.beatList = beatData.beatList || [];
                this.nextSpawnIndex = 0;
                this.notes = [];
                
                console.log(`[RhythmRenderer] 加载节拍数据: ${this.beatList.length} 个节拍`);
                
                // 显示开始提示
                document.getElementById('start-hint').classList.add('hidden');
            }

            /**
             * 开始渲染循环
             */
            start() {
                if (this.isRunning) return;
                this.isRunning = true;
                this.lastFrameTime = performance.now();
                this.renderLoop();
                console.log('[RhythmRenderer] 渲染循环开始');
            }

            /**
             * 停止渲染循环
             */
            stop() {
                this.isRunning = false;
                console.log('[RhythmRenderer] 渲染循环停止');
            }

            /**
             * 主渲染循环
             */
            renderLoop() {
                if (!this.isRunning) return;
                
                const currentTime = performance.now();
                const deltaTime = currentTime - this.lastFrameTime;
                this.lastFrameTime = currentTime;
                
                // 计算 FPS
                this.fps = Math.round(1000 / deltaTime);
                
                // 获取音频当前时间（唯一时间基准）
                const audioTime = this.audioPlayer.currentTime;
                
                // 预生成节奏点
                this.spawnNotes(audioTime);
                
                // 更新所有节奏点
                this.updateNotes(audioTime, deltaTime);
                
                // 清空画布
                this.ctx.clearRect(0, 0, this.width, this.height);
                this.uiCtx.clearRect(0, 0, this.width, this.height);
                
                // 渲染节奏点
                this.renderNotes();
                
                // 渲染UI
                this.renderUI();
                
                // 更新调试信息
                if (this.debugMode) {
                    this.updateDebugInfo(audioTime);
                }
                
                requestAnimationFrame(() => this.renderLoop());
            }

            /**
             * 预生成节奏点 - 左右半圆交替，约束在8条轨道上
             * 轨道角度: 22.5°, 67.5°, 112.5°, 157.5°, 202.5°, 247.5°, 292.5°, 337.5°
             * 左半圆: 索引 2(112.5°), 3(157.5°), 4(202.5°), 5(247.5°)
             * 右半圆: 索引 0(22.5°), 1(67.5°), 6(292.5°), 7(337.5°)
             */
            spawnNotes(audioTime) {
                const preGenerateSec = CONSTANTS.PRE_GENERATE_TIME / 1000;
                const trackAngles = CONSTANTS.TRACK_ANGLES;
                // 左半圆轨道索引: 112.5°, 157.5°, 202.5°, 247.5°
                const leftTracks = [2, 3, 4, 5];
                // 右半圆轨道索引: 22.5°, 67.5°, 292.5°, 337.5°
                const rightTracks = [0, 1, 6, 7];
                
                while (this.nextSpawnIndex < this.beatList.length) {
                    const beatTime = this.beatList[this.nextSpawnIndex];
                    
                    if (beatTime > audioTime + preGenerateSec) {
                        break;
                    }
                    
                    // 交替左右半圆：偶数索引=左半圆，奇数索引=右半圆
                    const isLeftTurn = (this.nextSpawnIndex % 2 === 0);
                    
                    // 从对应半圆的轨道中随机选一条
                    let trackIdx;
                    if (isLeftTurn) {
                        trackIdx = leftTracks[Math.floor(Math.random() * leftTracks.length)];
                    } else {
                        trackIdx = rightTracks[Math.floor(Math.random() * rightTracks.length)];
                    }
                    
                    const angle = trackAngles[trackIdx];
                    
                    // 创建节奏点（约束在轨道上）
                    const note = new RhythmNote(beatTime, this.nextSpawnIndex, angle, isLeftTurn);
                    note.trackAngle = angle;
                    note.trackIndex = trackIdx;
                    this.notes.push(note);
                    
                    this.nextSpawnIndex++;
                }
            }

            /**
             * 更新所有节奏点
             */
            updateNotes(audioTime, deltaTime) {
                for (let i = this.notes.length - 1; i >= 0; i--) {
                    const note = this.notes[i];
                    note.update(audioTime, deltaTime, this.center);
                    
                    // 移除已消失的节奏点
                    if (note.canRemove()) {
                        console.log(`[RhythmRenderer] 移除节奏点 #${note.index}`);
                        this.notes.splice(i, 1);
                    }
                }
            }

            /**
             * 渲染所有节奏点
             */
            renderNotes() {
                // 先渲染圆心波形脉冲环
                this.renderPulseRings();
                
                // 渲染轨道光晕（节奏点越接近圆周，光晕越强）
                this.renderTrackGlow();
                
                // 渲染中心大圆
                this.renderCenterCircle();
                
                // 按半径排序，先画远的
                const sortedNotes = [...this.notes].sort((a, b) => b.currentRadius - a.currentRadius);
                
                for (const note of sortedNotes) {
                    note.render(this.ctx);
                }
            }
            
            /**
             * 渲染轨道光晕效果 - 节奏点越接近圆周，对应轨道光晕越强
             */
            renderTrackGlow() {
                const ctx = this.ctx;
                const R = CONSTANTS.CENTER_CIRCLE_RADIUS;
                
                for (const note of this.notes) {
                    if (note.state === NoteState.PENDING || note.state === NoteState.FADING) continue;
                    if (note.opacity <= 0) continue;
                    
                    // 计算节奏点到圆周的距离比例（0=在圆周上，1=很远）
                    const dist = Math.abs(note.currentRadius - R);
                    const maxGlowDist = R * 0.6;  // 在60%半径范围内都有光晕
                    const glowIntensity = Math.max(0, 1 - dist / maxGlowDist);
                    
                    if (glowIntensity <= 0.05) continue;
                    
                    // 绘制轨道光晕线
                    const angle = note.angle;
                    const glowLength = R + 40;
                    
                    ctx.save();
                    
                    // 渐变光晕：从圆心到圆周
                    const gradient = ctx.createLinearGradient(
                        this.center.x, this.center.y,
                        this.center.x + Math.cos(angle) * glowLength,
                        this.center.y + Math.sin(angle) * glowLength
                    );
                    
                    const color = note.getCurrentColor();
                    const alpha = glowIntensity * 0.4 * note.opacity;
                    gradient.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
                    gradient.addColorStop(0.5, `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha * 0.3})`);
                    gradient.addColorStop(0.85, `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`);
                    gradient.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha * 0.2})`);
                    
                    ctx.beginPath();
                    ctx.moveTo(this.center.x, this.center.y);
                    ctx.lineTo(
                        this.center.x + Math.cos(angle) * glowLength,
                        this.center.y + Math.sin(angle) * glowLength
                    );
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 4 + glowIntensity * 12;  // 越近越粗
                    ctx.shadowBlur = glowIntensity * 30;
                    ctx.shadowColor = `rgba(${color.r}, ${color.g}, ${color.b}, ${glowIntensity * 0.6})`;
                    ctx.stroke();
                    
                    // 圆周交汇点发光
                    if (glowIntensity > 0.3) {
                        const px = this.center.x + Math.cos(angle) * R;
                        const py = this.center.y + Math.sin(angle) * R;
                        ctx.beginPath();
                        ctx.arc(px, py, 6 + glowIntensity * 10, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${glowIntensity * 0.5})`;
                        ctx.shadowBlur = glowIntensity * 25;
                        ctx.fill();
                    }
                    
                    ctx.restore();
                }
            }
            
            /**
             * 触发圆心脉冲波形（在节拍时刻调用）
             */
            triggerPulse(color) {
                this.pulseRings.push({
                    radius: 15,
                    maxRadius: CONSTANTS.CENTER_CIRCLE_RADIUS * 0.6,
                    opacity: 0.8,
                    speed: 180,
                    r: color ? color.r : 100,
                    g: color ? color.g : 200,
                    b: color ? color.b : 255,
                    type: this.waveformType,  // 记录触发时的波形类型
                    age: 0,  // 存活时间（帧数）
                    startAngle: Math.random() * Math.PI * 2  // 随机起始角度
                });
            }
            
            /**
             * 渲染圆心脉冲环形波形特效 - 4种类型，每10秒切换
             * 类型0: 扩展圆环
             * 类型1: 旋转多边形爆发
             * 类型2: 螺旋波
             * 类型3: 粒子散射星形
             */
            renderPulseRings() {
                const ctx = this.ctx;
                const audioTime = this.audioPlayer.currentTime;
                
                // 每10秒切换波形类型
                if (audioTime - this.waveformSwitchTime >= 10) {
                    this.waveformType = (this.waveformType + 1) % 4;
                    this.waveformSwitchTime = audioTime;
                    console.log(`[RhythmRenderer] 波形切换为类型 ${this.waveformType}`);
                }
                
                // 更新旋转角度
                this.waveformRotation += 0.02;
                
                // 检查是否有节奏点刚到达圆周附近（触发新脉冲）
                for (const note of this.notes) {
                    if (note.state === NoteState.ACTIVE && note.index !== this.lastBeatPulseIndex) {
                        const dist = Math.abs(note.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                        if (dist < 30) {
                            this.lastBeatPulseIndex = note.index;
                            const c = note.getCurrentColor();
                            this.triggerPulse(c);
                        }
                    }
                }
                
                // 更新和渲染脉冲
                for (let i = this.pulseRings.length - 1; i >= 0; i--) {
                    const ring = this.pulseRings[i];
                    
                    ring.radius += ring.speed * (1 / 60);
                    ring.opacity -= 0.015;
                    ring.age++;
                    
                    if (ring.opacity <= 0 || ring.radius > ring.maxRadius) {
                        this.pulseRings.splice(i, 1);
                        continue;
                    }
                    
                    ctx.save();
                    
                    const cx = this.center.x;
                    const cy = this.center.y;
                    const colorStr = `rgba(${ring.r}, ${ring.g}, ${ring.b}`;
                    
                    switch (ring.type) {
                        case 0:
                            // 类型0: 经典扩展圆环
                            ctx.beginPath();
                            ctx.arc(cx, cy, ring.radius, 0, Math.PI * 2);
                            ctx.strokeStyle = `${colorStr}, ${ring.opacity})`;
                            ctx.lineWidth = 3 + ring.opacity * 4;
                            ctx.shadowBlur = ring.opacity * 20;
                            ctx.shadowColor = `${colorStr}, ${ring.opacity * 0.8})`;
                            ctx.stroke();
                            // 内环装饰
                            if (ring.radius > 30) {
                                ctx.beginPath();
                                ctx.arc(cx, cy, ring.radius * 0.6, 0, Math.PI * 2);
                                ctx.strokeStyle = `${colorStr}, ${ring.opacity * 0.4})`;
                                ctx.lineWidth = 1.5;
                                ctx.stroke();
                            }
                            break;
                            
                        case 1: {
                            // 类型1: 旋转多边形爆发（六边形/八边形）
                            const sides = 6;
                            const rot = this.waveformRotation + ring.startAngle;
                            // 外多边形
                            ctx.beginPath();
                            for (let s = 0; s <= sides; s++) {
                                const a = rot + (s * Math.PI * 2) / sides;
                                const px = cx + Math.cos(a) * ring.radius;
                                const py = cy + Math.sin(a) * ring.radius;
                                if (s === 0) ctx.moveTo(px, py);
                                else ctx.lineTo(px, py);
                            }
                            ctx.closePath();
                            ctx.strokeStyle = `${colorStr}, ${ring.opacity})`;
                            ctx.lineWidth = 2.5 + ring.opacity * 3;
                            ctx.shadowBlur = ring.opacity * 18;
                            ctx.shadowColor = `${colorStr}, ${ring.opacity * 0.7})`;
                            ctx.stroke();
                            // 内旋转多边形（反方向）
                            if (ring.radius > 25) {
                                ctx.beginPath();
                                for (let s = 0; s <= sides; s++) {
                                    const a = -rot + (s * Math.PI * 2) / sides;
                                    const px = cx + Math.cos(a) * ring.radius * 0.5;
                                    const py = cy + Math.sin(a) * ring.radius * 0.5;
                                    if (s === 0) ctx.moveTo(px, py);
                                    else ctx.lineTo(px, py);
                                }
                                ctx.closePath();
                                ctx.strokeStyle = `${colorStr}, ${ring.opacity * 0.5})`;
                                ctx.lineWidth = 1.5;
                                ctx.stroke();
                            }
                            break;
                        }
                            
                        case 2: {
                            // 类型2: 螺旋波
                            const spiralTurns = 2;
                            const spiralPoints = 80;
                            ctx.beginPath();
                            for (let s = 0; s <= spiralPoints; s++) {
                                const t = s / spiralPoints;
                                const a = ring.startAngle + t * Math.PI * 2 * spiralTurns + this.waveformRotation;
                                const r = ring.radius * t;
                                const px = cx + Math.cos(a) * r;
                                const py = cy + Math.sin(a) * r;
                                if (s === 0) ctx.moveTo(px, py);
                                else ctx.lineTo(px, py);
                            }
                            ctx.strokeStyle = `${colorStr}, ${ring.opacity * 0.9})`;
                            ctx.lineWidth = 2 + ring.opacity * 3;
                            ctx.shadowBlur = ring.opacity * 15;
                            ctx.shadowColor = `${colorStr}, ${ring.opacity * 0.6})`;
                            ctx.stroke();
                            // 反向螺旋
                            ctx.beginPath();
                            for (let s = 0; s <= spiralPoints; s++) {
                                const t = s / spiralPoints;
                                const a = ring.startAngle + Math.PI - t * Math.PI * 2 * spiralTurns - this.waveformRotation;
                                const r = ring.radius * t;
                                const px = cx + Math.cos(a) * r;
                                const py = cy + Math.sin(a) * r;
                                if (s === 0) ctx.moveTo(px, py);
                                else ctx.lineTo(px, py);
                            }
                            ctx.strokeStyle = `${colorStr}, ${ring.opacity * 0.5})`;
                            ctx.lineWidth = 1.5;
                            ctx.stroke();
                            break;
                        }
                            
                        case 3: {
                            // 类型3: 粒子散射星形
                            const rays = 8;
                            const rot3 = this.waveformRotation * 0.5 + ring.startAngle;
                            // 绘制星形射线
                            for (let s = 0; s < rays; s++) {
                                const a = rot3 + (s * Math.PI * 2) / rays;
                                const innerR = ring.radius * 0.2;
                                const outerR = ring.radius;
                                // 主射线
                                ctx.beginPath();
                                ctx.moveTo(cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR);
                                ctx.lineTo(cx + Math.cos(a) * outerR, cy + Math.sin(a) * outerR);
                                ctx.strokeStyle = `${colorStr}, ${ring.opacity * 0.8})`;
                                ctx.lineWidth = 2 + ring.opacity * 2;
                                ctx.shadowBlur = ring.opacity * 12;
                                ctx.shadowColor = `${colorStr}, ${ring.opacity * 0.5})`;
                                ctx.stroke();
                                // 射线端点光点
                                ctx.beginPath();
                                ctx.arc(
                                    cx + Math.cos(a) * outerR,
                                    cy + Math.sin(a) * outerR,
                                    3 + ring.opacity * 4, 0, Math.PI * 2
                                );
                                ctx.fillStyle = `${colorStr}, ${ring.opacity})`;
                                ctx.fill();
                            }
                            // 中间连接环
                            ctx.beginPath();
                            ctx.arc(cx, cy, ring.radius * 0.5, 0, Math.PI * 2);
                            ctx.strokeStyle = `${colorStr}, ${ring.opacity * 0.3})`;
                            ctx.lineWidth = 1;
                            ctx.shadowBlur = 0;
                            ctx.stroke();
                            break;
                        }
                    }
                    
                    ctx.restore();
                }
            }
            
            /**
             * 渲染中心大圆 - 节奏点的目标位置 + 动态呼吸
             */
            renderCenterCircle() {
                const ctx = this.ctx;
                const audioTime = this.audioPlayer.currentTime;
                
                // 根据脉冲环数量产生微弱的呼吸感
                const pulseScale = 1 + this.pulseRings.length * 0.005;
                const R = CONSTANTS.CENTER_CIRCLE_RADIUS;
                
                ctx.save();
                
                // 外圆环
                ctx.beginPath();
                ctx.arc(this.center.x, this.center.y, R, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 5;
                ctx.shadowBlur = 20 + this.pulseRings.length * 5;
                ctx.shadowColor = `rgba(100, 200, 255, ${0.3 + this.pulseRings.length * 0.1})`;
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                // 内圆环（装饰）
                ctx.beginPath();
                ctx.arc(this.center.x, this.center.y, R - 15, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 2;
                ctx.setLineDash([12, 12]);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // 中心动态发光核心
                const coreGlow = 0.1 + this.pulseRings.length * 0.08;
                const coreRadius = 20 * pulseScale;
                const gradient = ctx.createRadialGradient(
                    this.center.x, this.center.y, 0,
                    this.center.x, this.center.y, coreRadius * 2
                );
                gradient.addColorStop(0, `rgba(200, 230, 255, ${Math.min(0.8, coreGlow + 0.3)})`);
                gradient.addColorStop(0.4, `rgba(100, 200, 255, ${coreGlow})`);
                gradient.addColorStop(1, 'rgba(100, 200, 255, 0)');
                
                ctx.beginPath();
                ctx.arc(this.center.x, this.center.y, coreRadius * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 中心实心点
                ctx.beginPath();
                ctx.arc(this.center.x, this.center.y, 8 * pulseScale, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.fill();
                
                // 点击区域提示
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('点击区域', this.center.x, this.center.y - R - 20);
                
                ctx.restore();
            }

            /**
             * 渲染UI
             */
            renderUI() {
                // 击中效果文字
                for (const note of this.notes) {
                    if (note.state === NoteState.HIT && note.hitEffectTime > 0) {
                        this.uiCtx.save();
                        this.uiCtx.fillStyle = '#0f0';
                        this.uiCtx.font = 'bold 24px Arial';
                        this.uiCtx.textAlign = 'center';
                        this.uiCtx.fillText('PERFECT!', note.x, note.y - 50);
                        this.uiCtx.restore();
                    } else if (note.state === NoteState.MISSED) {
                        this.uiCtx.save();
                        this.uiCtx.fillStyle = '#f00';
                        this.uiCtx.font = 'bold 20px Arial';
                        this.uiCtx.textAlign = 'center';
                        this.uiCtx.fillText('MISS', note.x, note.y - 30);
                        this.uiCtx.restore();
                    }
                    
                    // 调试：显示距离中心圆的距离
                    if (this.debugMode && (note.state === NoteState.ACTIVE || note.state === NoteState.SPAWNING)) {
                        const distFromCenter = Math.abs(note.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                        this.uiCtx.save();
                        this.uiCtx.fillStyle = distFromCenter < 30 ? '#0f0' : '#888';
                        this.uiCtx.font = '10px Arial';
                        this.uiCtx.textAlign = 'center';
                        this.uiCtx.fillText(`${distFromCenter.toFixed(0)}px`, note.x, note.y + 25);
                        this.uiCtx.restore();
                    }
                }
                
                // 最佳点击时机提示
                const activeNotes = this.notes.filter(n => n.state === NoteState.ACTIVE);
                if (activeNotes.length > 0) {
                    // 找到最接近中心圆的节奏点
                    const closestNote = activeNotes.reduce((closest, note) => {
                        const noteDist = Math.abs(note.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                        const closestDist = Math.abs(closest.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                        return noteDist < closestDist ? note : closest;
                    });
                    
                    const dist = Math.abs(closestNote.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                    
                    // 在中心圆附近显示提示
                    if (dist < 40) {
                        this.uiCtx.save();
                        this.uiCtx.strokeStyle = `rgba(0, 255, 100, ${1 - dist / 40})`;
                        this.uiCtx.lineWidth = 3;
                        this.uiCtx.beginPath();
                        this.uiCtx.arc(this.center.x, this.center.y, CONSTANTS.CENTER_CIRCLE_RADIUS, 0, Math.PI * 2);
                        this.uiCtx.stroke();
                        this.uiCtx.restore();
                    }
                }
            }

            /**
             * 更新调试信息
             */
            updateDebugInfo(audioTime) {
                document.getElementById('fps').textContent = this.fps;
                document.getElementById('audio-time').textContent = audioTime.toFixed(3);
                document.getElementById('active-notes').textContent = this.notes.length;
                
                // 下一个节拍信息
                if (this.nextSpawnIndex < this.beatList.length) {
                    const nextBeat = this.beatList[this.nextSpawnIndex];
                    const timeToNext = (nextBeat - audioTime) * 1000;
                    document.getElementById('next-beat').textContent = 
                        `${nextBeat.toFixed(2)}s (${timeToNext.toFixed(0)}ms)`;
                } else {
                    document.getElementById('next-beat').textContent = '无';
                }
                
                // 找到最接近中心圆的节奏点
                let closestDist = Infinity;
                let closestTimeDiff = Infinity;
                for (const note of this.notes) {
                    if (note.state === NoteState.ACTIVE || note.state === NoteState.SPAWNING) {
                        const dist = Math.abs(note.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                        if (dist < closestDist) {
                            closestDist = dist;
                            closestTimeDiff = Math.abs(audioTime - note.beatTime) * 1000;
                        }
                    }
                }
                
                const hitWindowEl = document.getElementById('hit-window');
                if (closestDist === Infinity) {
                    hitWindowEl.textContent = '--';
                    hitWindowEl.style.color = '#0f0';
                } else {
                    hitWindowEl.textContent = `${closestDist.toFixed(0)}px / ${closestTimeDiff.toFixed(0)}ms`;
                    // 在最佳点击位置附近时变绿色
                    hitWindowEl.style.color = closestDist < 30 ? '#0f0' : '#888';
                }
            }

            /**
             * 尝试击中节奏点
             * 判断依据：节奏点是否在中心圆周附近（最佳点击位置）
             */
            tryHit() {
                const audioTime = this.audioPlayer.currentTime;
                let hitNote = null;
                let bestScore = Infinity;
                
                // 找到最接近中心圆周的可击中节奏点
                for (const note of this.notes) {
                    if (note.state === NoteState.ACTIVE || note.state === NoteState.SPAWNING) {
                        // 计算距离中心圆周的距离
                        const distFromCenter = Math.abs(note.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                        // 计算时间差
                        const timeDiff = Math.abs(audioTime - note.beatTime) * 1000;
                        
                        // 综合评分：距离中心圆越近越好
                        const score = distFromCenter + timeDiff * 0.1;
                        
                        if (distFromCenter < 50 && score < bestScore) {  // 在中心圆附近50像素内
                            bestScore = score;
                            hitNote = note;
                        }
                    }
                }
                
                // 尝试击中
                if (hitNote && hitNote.tryHit(audioTime)) {
                    this.onHit(hitNote, Math.abs(audioTime - hitNote.beatTime));
                    return true;
                }
                
                console.log('[RhythmRenderer] 未命中任何节奏点');
                return false;
            }

            /**
             * 击中回调
             */
            onHit(note, timeDiff) {
                this.combo++;
                this.maxCombo = Math.max(this.maxCombo, this.combo);
                
                // 根据准确度计算分数
                const accuracy = 1 - (timeDiff / (CONSTANTS.ACTIVE_WINDOW_START / 1000));
                const points = Math.round(100 * accuracy + this.combo * 10);
                this.score += points;
                
                // 更新UI
                document.getElementById('score').textContent = this.score;
                document.getElementById('combo').textContent = `Combo: ${this.combo}`;
                
                console.log(`[RhythmRenderer] ✅ 命中! 准确度=${(accuracy * 100).toFixed(1)}%, 分数=${points}, 连击=${this.combo}`);
            }

            /**
             * 错过回调
             */
            onMiss(note) {
                this.combo = 0;
                document.getElementById('combo').textContent = `Combo: ${this.combo}`;
                console.log(`[RhythmRenderer] ❌ 错过节奏点 #${note.index}`);
            }

            /**
             * 切换调试模式
             */
            toggleDebug() {
                this.debugMode = !this.debugMode;
                document.getElementById('debug-info').classList.toggle('hidden');
                console.log(`[RhythmRenderer] 调试模式: ${this.debugMode ? '开启' : '关闭'}`);
            }

            /**
             * 设置事件监听
             */
            setupEventListeners() {
                // 键盘控制
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.tryHit();
                    } else if (e.code === 'KeyD') {
                        this.toggleDebug();
                    }
                });
                
                // 鼠标/触摸点击
                this.canvas.addEventListener('mousedown', () => this.tryHit());
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.tryHit();
                });
            }
        }

        // ==================== 全局回调接口 ====================

        /**
         * 节奏点命中回调（供外部模块调用，如手部识别）
         * @param {RhythmNote} note - 命中的节奏点

         */
        window.onNoteHit = function(note, audioTime) {
            console.log(`[Callback] onNoteHit called: note #${note.index} at ${audioTime.toFixed(3)}s`);
            // 这里可以接入手部识别、碰撞检测等外部逻辑
        };

         * 节奏点错过回调

         */
        window.onNoteMiss = function(note, audioTime) {

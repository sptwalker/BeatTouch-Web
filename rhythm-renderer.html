        };

        // ==================== 全局变量和函数 ====================
        let rhythmRenderer;
        let beatData = null;

        /**
         * 加载预设打点数据（从 music-point 目录）
         */
        async function loadPresetBeatData(select) {
            const filePath = select.value;
            if (!filePath) return;

            try {
                console.log(`[Main] 加载预设打点数据: ${filePath}`);
                const response = await fetch(filePath);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                beatData = await response.json();
                console.log('[Main] 预设打点数据加载成功:', beatData);
                
                // 加载到渲染器
                rhythmRenderer.loadBeatData(beatData);
                
                // 更新UI提示
                const fileName = filePath.split('/').pop().replace(/beat-data-\d+\(|\)\.json/g, '');
                document.getElementById('audio-info').textContent = `已选: ${fileName}`;
                
                // 启用播放按钮（如果有音频）
                document.getElementById('play-btn').disabled = !document.getElementById('audio-player').src;
                
                // 提示用户上传对应音乐
                if (!document.getElementById('audio-player').src) {
                    alert(`已加载「${fileName}」的打点数据（${beatData.beatList.length} 个节拍点）\n\n请上传对应的 MP3 音乐文件开始游戏！`);
                } else {
                    alert(`成功加载 ${beatData.beatList.length} 个节拍点`);
                }
                
            } catch (err) {
                console.error('[Main] 加载预设失败:', err);
                alert('加载预设失败: ' + err.message + '\n\n请确保通过 Live Server 运行以支持 fetch API');
                select.value = '';
            }
        }

        /**
         * 加载自定义节拍数据文件
         */
        function loadBeatData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    beatData = JSON.parse(e.target.result);
                    console.log('[Main] 自定义节拍数据加载成功:', beatData);
                    
                    // 加载到渲染器
                    rhythmRenderer.loadBeatData(beatData);
                    
                    // 启用播放按钮
                    document.getElementById('play-btn').disabled = !document.getElementById('audio-player').src;
                    
                    // 重置预设选择框
                    document.getElementById('preset-beat-select').value = '';
                    
                    alert(`成功加载 ${beatData.beatList.length} 个节拍点`);
                } catch (err) {
                    alert('加载失败: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        /**
         * 音频上传处理
         */
        document.getElementById('audio-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const audioPlayer = document.getElementById('audio-player');
            audioPlayer.src = url;
            
            // 提取文件名（不含扩展名）用于匹配提示
            const songName = file.name.replace(/\.[^/.]+$/, '');
            document.getElementById('audio-info').textContent = `🎵 ${file.name}`;
            document.getElementById('play-btn').disabled = !beatData;
            
            console.log('[Main] 音频加载:', file.name);
            
            // 提示用户选择打点数据（如果还没选）
            if (!beatData) {
                alert(`已上传音乐: ${songName}\n\n请从上方选择对应的打点数据！`);
            }
        });

        /**
         * 播放/暂停切换
         */
        function togglePlay() {
            const audioPlayer = document.getElementById('audio-player');
            const setupPanel = document.getElementById('setup-panel');
            const playbackBar = document.getElementById('playback-bar');
            const barPlayBtn = document.getElementById('bar-play-btn');
            const playBtn = document.getElementById('play-btn');
            
            if (audioPlayer.paused) {
                audioPlayer.play();
                // 切换到紧凑播放栏
                setupPanel.style.display = 'none';
                playbackBar.classList.remove('hidden');
                barPlayBtn.textContent = '⏸';
                playBtn.textContent = '⏸ 暂停';
                // 更新歌名
                const songInfo = document.getElementById('audio-info').textContent;
                document.getElementById('bar-song-name').textContent = songInfo;
                // 隐藏开始提示
                document.getElementById('start-hint').classList.add('hidden');
                rhythmRenderer.start();
                // 自动开启摄像头
                if (!handTracker.isActive) handTracker.start();
            } else {
                audioPlayer.pause();
                barPlayBtn.textContent = '▶';
                playBtn.textContent = '▶ 播放';
                rhythmRenderer.stop();
            }
        }
        
        /**
         * 停止并重置（退出按钮）
         */
        function stopAndReset() {
            const audioPlayer = document.getElementById('audio-player');
            const setupPanel = document.getElementById('setup-panel');
            const playbackBar = document.getElementById('playback-bar');
            const playBtn = document.getElementById('play-btn');
            
            // 停止音频
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            
            // 停止渲染
            rhythmRenderer.stop();
            
            // 自动关闭摄像头
            if (handTracker.isActive) handTracker.stop();
            
            // 重置节奏点
            rhythmRenderer.notes = [];
            rhythmRenderer.nextSpawnIndex = 0;
            rhythmRenderer.pulseRings = [];
            rhythmRenderer.lastBeatPulseIndex = -1;
            rhythmRenderer.waveformType = 0;
            rhythmRenderer.waveformSwitchTime = 0;
            rhythmRenderer.score = 0;
            rhythmRenderer.combo = 0;
            
            // 清空画布
            rhythmRenderer.ctx.clearRect(0, 0, rhythmRenderer.width, rhythmRenderer.height);
            rhythmRenderer.uiCtx.clearRect(0, 0, rhythmRenderer.width, rhythmRenderer.height);
            if (handTracker.handCtx) {
                handTracker.handCtx.clearRect(0, 0, handTracker.handCanvas.width, handTracker.handCanvas.height);
            }
            
            // 切换回设置面板
            setupPanel.style.display = 'flex';
            playbackBar.classList.add('hidden');
            playBtn.textContent = '▶ 播放';
            
            // 重置分数显示
            document.getElementById('score').textContent = '0';
            document.getElementById('combo').textContent = 'Combo: 0';
            
            console.log('[Main] 已停止并重置');
        }

        /**
         * 模拟击中（测试用）
         */
        function simulateHit() {
            rhythmRenderer.tryHit();
        }

        // 音频播放结束处理
        document.getElementById('audio-player').addEventListener('ended', function() {
            document.getElementById('play-btn').textContent = '▶ 播放';
            document.getElementById('bar-play-btn').textContent = '▶';
            rhythmRenderer.stop();
            // 自动关闭摄像头
            if (handTracker.isActive) handTracker.stop();
            // 恢复设置面板
            document.getElementById('setup-panel').style.display = 'flex';
            document.getElementById('playback-bar').classList.add('hidden');
        });

        // ==================== 手部追踪模块 ====================
        const handTracker = {
            hands: null,
            camera: null,
            isActive: false,
            handCanvas: null,
            handCtx: null,
            
            // 双手光标状态
            cursors: [
                { x: 0, y: 0, visible: false, smoothX: 0, smoothY: 0, lastHitTime: 0, trail: [], label: 'L' },
                { x: 0, y: 0, visible: false, smoothX: 0, smoothY: 0, lastHitTime: 0, trail: [], label: 'R' }
            ],
            
            // 平滑参数
            SMOOTH_FACTOR: 0.35,       // EMA 平滑系数 (0~1, 越小越平滑)
            CURSOR_RADIUS: 40,         // 光标半径
            HIT_COOLDOWN: 300,         // 同一手击中冷却时间(ms)
            HIT_DISTANCE: 70,          // 手掌触碰节奏点的判定距离
            TRAIL_LENGTH: 8,           // 拖尾长度
            
            /**
             * 初始化 MediaPipe Hands
             */
            async init() {
                this.handCanvas = document.getElementById('hand-layer');
                this.handCtx = this.handCanvas.getContext('2d');
                
                // 同步画布尺寸
                this.syncCanvasSize();
                window.addEventListener('resize', () => this.syncCanvasSize());
                
                this.hands = new Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
                });
                
                this.hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 0,       // 0=Lite 最低延迟
                    minDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.5
                });
                
                this.hands.onResults((results) => this.onHandResults(results));
                
                console.log('[HandTracker] MediaPipe Hands 初始化完成');
            },
            
            syncCanvasSize() {
                if (!this.handCanvas) return;
                const wrapper = document.getElementById('canvas-wrapper');
                const rect = wrapper.getBoundingClientRect();
                this.handCanvas.width = rect.width;
                this.handCanvas.height = rect.height;
            },
            
            /**
             * 启动摄像头
             */
            async start() {
                if (this.isActive) return;
                
                const statusEl = document.getElementById('camera-status');
                const statusText = document.getElementById('camera-status-text');
                statusEl.style.display = 'flex';
                statusText.textContent = '正在启动摄像头...';
                
                try {
                    if (!this.hands) await this.init();
                    
                    const videoEl = document.getElementById('camera-layer');
                    
                    this.camera = new Camera(videoEl, {
                        onFrame: async () => {
                            if (this.isActive) {
                                await this.hands.send({ image: videoEl });
                            }
                        },
                        width: 640,
                        height: 360,
                        facingMode: 'user'
                    });
                    
                    await this.camera.start();
                    this.isActive = true;
                    
                    // 显示摄像头背景
                    videoEl.style.opacity = '0.25';
                    videoEl.style.transform = 'scaleX(-1)';  // 镜像
                    
                    statusEl.classList.add('active');
                    statusText.textContent = '手部追踪中';
                    
                    // 启动手部光标渲染循环
                    this.renderLoop();
                    
                    console.log('[HandTracker] 摄像头已启动');
                } catch (err) {
                    console.error('[HandTracker] 摄像头启动失败:', err);
                    statusText.textContent = '摄像头启动失败';
                    alert('摄像头启动失败: ' + err.message);
                }
            },
            
            /**
             * 停止摄像头
             */
            stop() {
                this.isActive = false;
                if (this.camera) {
                    this.camera.stop();
                    this.camera = null;
                }
                
                // 隐藏摄像头背景
                const videoEl = document.getElementById('camera-layer');
                videoEl.style.opacity = '0';
                
                // 清空手部画布
                if (this.handCtx) {
                    this.handCtx.clearRect(0, 0, this.handCanvas.width, this.handCanvas.height);
                }
                
                // 重置光标
                this.cursors.forEach(c => { c.visible = false; c.trail = []; });
                
                const statusEl = document.getElementById('camera-status');
                statusEl.classList.remove('active');
                document.getElementById('camera-status-text').textContent = '摄像头已关闭';
                
                console.log('[HandTracker] 摄像头已停止');
            },
            
            /**
             * MediaPipe 手部检测回调
             */
            onHandResults(results) {
                if (!results.multiHandLandmarks) return;
                
                const w = this.handCanvas.width;
                const h = this.handCanvas.height;
                
                // 重置所有光标可见性
                this.cursors[0].visible = false;
                this.cursors[1].visible = false;
                
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handedness = results.multiHandedness[i];
                    
                    // MediaPipe 镜像：Right 实际是用户左手，Left 实际是用户右手
                    // 光标索引: 0=左手, 1=右手
                    const isRight = handedness.label === 'Left';  // 用户的右手
                    const cursorIdx = isRight ? 1 : 0;
                    const cursor = this.cursors[cursorIdx];
                    
                    // 使用手掌中心（wrist=0 和 middle_finger_mcp=9 的中点）
                    const wrist = landmarks[0];
                    const middleMcp = landmarks[9];
                    const rawX = (wrist.x + middleMcp.x) / 2;
                    const rawY = (wrist.y + middleMcp.y) / 2;
                    
                    // 镜像映射到画布坐标
                    const targetX = (1 - rawX) * w;
                    const targetY = rawY * h;
                    
                    // EMA 平滑防抖
                    if (!cursor.visible) {
                        // 首次出现，直接跳到位置
                        cursor.smoothX = targetX;
                        cursor.smoothY = targetY;
                    } else {
                        cursor.smoothX += (targetX - cursor.smoothX) * this.SMOOTH_FACTOR;
                        cursor.smoothY += (targetY - cursor.smoothY) * this.SMOOTH_FACTOR;
                    }
                    
                    cursor.x = cursor.smoothX;
                    cursor.y = cursor.smoothY;
                    cursor.visible = true;
                    
                    // 更新拖尾
                    cursor.trail.push({ x: cursor.x, y: cursor.y });
                    if (cursor.trail.length > this.TRAIL_LENGTH) {
                        cursor.trail.shift();
                    }
                }
                
                // 碰撞检测 - 手掌触碰节奏点
                this.checkCollisions();
            },
            
            /**
             * 碰撞检测：手掌光标 vs ACTIVE 节奏点
             */
            checkCollisions() {
                if (!rhythmRenderer || !rhythmRenderer.isRunning) return;
                
                const now = performance.now();
                const audioTime = rhythmRenderer.audioPlayer.currentTime;
                
                for (const cursor of this.cursors) {
                    if (!cursor.visible) continue;
                    if (now - cursor.lastHitTime < this.HIT_COOLDOWN) continue;
                    
                    for (const note of rhythmRenderer.notes) {
                        if (note.state !== NoteState.ACTIVE && note.state !== NoteState.SPAWNING) continue;
                        
                        // 计算手掌光标与节奏点的距离
                        const dx = cursor.x - note.x;
                        const dy = cursor.y - note.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        // 判定距离 = 光标半径 + 节奏点半径 * 缩放
                        const hitDist = this.CURSOR_RADIUS + CONSTANTS.NOTE_RADIUS * note.scale;
                        
                        if (dist < hitDist) {
                            // 额外检查：节奏点是否在中心圆附近（保持与原有逻辑一致）
                            const distFromCenter = Math.abs(note.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                            const timeDiff = Math.abs(audioTime - note.beatTime) * 1000;
                            
                            if (distFromCenter < 80 || timeDiff <= CONSTANTS.ACTIVE_WINDOW_START) {
                                if (note.tryHit(audioTime)) {
                                    rhythmRenderer.onHit(note, Math.abs(audioTime - note.beatTime));
                                    cursor.lastHitTime = now;
                                    console.log(`[HandTracker] 🖐️ 手掌击中节奏点 #${note.index}`);
                                    break;  // 一只手一帧只击中一个
                                }
                            }
                        }
                    }
                }
            },
            
            /**
             * 手部光标渲染循环
             */
            renderLoop() {
                if (!this.isActive) return;
                
                const ctx = this.handCtx;
                const w = this.handCanvas.width;
                const h = this.handCanvas.height;
                ctx.clearRect(0, 0, w, h);
                
                const now = performance.now();
                
                for (const cursor of this.cursors) {
                    if (!cursor.visible) continue;
                    
                    const isHitting = (now - cursor.lastHitTime) < 150;
                    const R = this.CURSOR_RADIUS;
                    
                    // 绘制拖尾
                    if (cursor.trail.length > 1) {
                        ctx.save();
                        ctx.lineCap = 'round';
                        for (let i = 1; i < cursor.trail.length; i++) {
                            const alpha = (i / cursor.trail.length) * 0.3;
                            const width = (i / cursor.trail.length) * R * 0.6;
                            ctx.beginPath();
                            ctx.moveTo(cursor.trail[i - 1].x, cursor.trail[i - 1].y);
                            ctx.lineTo(cursor.trail[i].x, cursor.trail[i].y);
                            ctx.strokeStyle = cursor.label === 'L' 
                                ? `rgba(0, 200, 255, ${alpha})` 
                                : `rgba(255, 100, 200, ${alpha})`;
                            ctx.lineWidth = width;
                            ctx.stroke();
                        }
                        ctx.restore();
                    }
                    
                    ctx.save();
                    
                    // 击中闪光效果
                    if (isHitting) {
                        const flashProgress = 1 - (now - cursor.lastHitTime) / 150;
                        ctx.shadowBlur = 40 + flashProgress * 30;
                        ctx.shadowColor = 'rgba(50, 255, 100, 0.9)';
                        
                        // 扩散环
                        ctx.beginPath();
                        ctx.arc(cursor.x, cursor.y, R * (1.5 + (1 - flashProgress) * 1.5), 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(50, 255, 100, ${flashProgress * 0.6})`;
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    }
                    
                    // 外圈光晕
                    const gradient = ctx.createRadialGradient(
                        cursor.x, cursor.y, R * 0.3,
                        cursor.x, cursor.y, R * 1.2
                    );
                    const baseColor = cursor.label === 'L' 
                        ? [0, 200, 255]   // 左手 - 青色
                        : [255, 100, 200]; // 右手 - 粉色
                    
                    gradient.addColorStop(0, `rgba(${baseColor.join(',')}, ${isHitting ? 0.6 : 0.35})`);
                    gradient.addColorStop(0.6, `rgba(${baseColor.join(',')}, ${isHitting ? 0.3 : 0.15})`);
                    gradient.addColorStop(1, `rgba(${baseColor.join(',')}, 0)`);
                    
                    ctx.beginPath();
                    ctx.arc(cursor.x, cursor.y, R * 1.2, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    
                    // 主圆环
                    ctx.beginPath();
                    ctx.arc(cursor.x, cursor.y, R, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(${baseColor.join(',')}, ${isHitting ? 1 : 0.7})`;
                    ctx.lineWidth = isHitting ? 4 : 2.5;
                    ctx.shadowBlur = isHitting ? 25 : 12;
                    ctx.shadowColor = `rgba(${baseColor.join(',')}, 0.6)`;
                    ctx.stroke();
                    
                    // 内圈十字准星
                    const crossSize = R * 0.35;
                    ctx.beginPath();
                    ctx.moveTo(cursor.x - crossSize, cursor.y);
                    ctx.lineTo(cursor.x + crossSize, cursor.y);
                    ctx.moveTo(cursor.x, cursor.y - crossSize);
                    ctx.lineTo(cursor.x, cursor.y + crossSize);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${isHitting ? 0.9 : 0.5})`;
                    ctx.lineWidth = 1.5;
                    ctx.shadowBlur = 0;
                    ctx.stroke();
                    
                    // 中心点
                    ctx.beginPath();
                    ctx.arc(cursor.x, cursor.y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${isHitting ? 1 : 0.7})`;
                    ctx.fill();
                    
                    // 手标签
                    ctx.font = 'bold 11px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillStyle = `rgba(${baseColor.join(',')}, 0.8)`;
                    ctx.fillText(cursor.label, cursor.x, cursor.y - R - 8);
                    
                    ctx.restore();
                }
                
                requestAnimationFrame(() => this.renderLoop());
            }
        };
        
        // ==================== 初始化 ====================
        window.addEventListener('DOMContentLoaded', () => {
            rhythmRenderer = new RhythmRenderer();
            console.log('[Main] BeatTouch 节奏渲染器已加载');
            console.log('[Main] 操作说明:');
            console.log('  - 空格键/点击: 击中节奏点');
            console.log('  - D键: 切换调试模式');
            console.log('  - 📷 摄像头: 手掌触碰节奏点');
            console.log('  - 先上传音乐，再导入打点JSON');
        });
    </script>
</body>
</html>

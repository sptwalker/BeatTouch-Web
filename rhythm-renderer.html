<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatTouch - 节奏渲染器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* 游戏容器 - 16:9 比例 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        
        #canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 177.78vh; /* 16:9 */
            max-height: 56.25vw; /* 9/16 */
        }
        
        /* 分层画布 */
        .game-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #bg-layer {
            z-index: 1;
            background: radial-gradient(ellipse at center, #1a1a4e 0%, #0a0a1e 100%);
        }
        
        #camera-layer {
            z-index: 2;
            opacity: 0.3;
            object-fit: cover;
        }
        
        #rhythm-layer {
            z-index: 3;
        }
        
        #ui-layer {
            z-index: 4;
            pointer-events: none;
        }
        
        /* 命中区域指示器 - 中心大圆 */
        #hit-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 640px;  /* CENTER_CIRCLE_RADIUS * 2 = 320 * 2 */
            height: 640px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }
        
        #hit-zone::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        /* 分数显示 */
        #score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            z-index: 5;
        }
        
        .score-value {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
        }
        
        .combo-value {
            font-size: 24px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
        
        /* 控制面板 */
        #control-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .control-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .control-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
        
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        #beat-data-input {
            display: none;
        }
        
        /* 调试信息 */
        #debug-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #0f0;
            max-width: 300px;
        }
        
        /* 音频上传区域 */
        #audio-controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        #audio-upload {
            display: none;
        }
        
        .upload-label {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: white;
            transition: all 0.3s;
        }
        
        .upload-label:hover {
            transform: scale(1.05);
        }
        
        #audio-player {
            display: none;
        }
        
        /* 开始提示 */
        #start-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            text-align: center;
            color: white;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 音频元素 -->
    <audio id="audio-player" crossorigin="anonymous"></audio>
    
    <!-- 音频控制区 -->
    <div id="audio-controls">
        <!-- 预设打点数据选择 -->
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="color: #888; font-size: 11px;">📁 选择预设打点数据</label>
            <select id="preset-beat-select" onchange="loadPresetBeatData(this)" style="padding: 8px 12px; border-radius: 6px; background: #222; color: #fff; border: 1px solid #444; font-size: 13px; min-width: 180px;">
                <option value="">-- 选择歌曲 --</option>
                <option value="music-point/beat-data-1775487199028(水手).json">🎵 水手</option>
                <option value="music-point/beat-data-1775487496502(铿锵玫瑰).json">🎵 铿锵玫瑰</option>
                <option value="music-point/beat-data-1775487593590(怒放的生命).json">🎵 怒放的生命</option>
                <option value="music-point/beat-data-1775487621295(光辉岁月).json">🎵 光辉岁月</option>
                <option value="music-point/beat-data-1775488995886(七十二变).json">🎵 七十二变</option>
            </select>
        </div>
        
        <div style="width: 1px; height: 40px; background: #444; margin: 0 10px;"></div>
        
        <!-- 音频上传 -->
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="color: #888; font-size: 11px;">🎵 上传对应音乐</label>
            <label class="upload-label" style="margin: 0;">
                <input type="file" id="audio-upload" accept="audio/mp3,audio/*">
                选择 MP3
            </label>
        </div>
        
        <div style="width: 1px; height: 40px; background: #444; margin: 0 10px;"></div>
        
        <!-- 或自定义导入 -->
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="color: #888; font-size: 11px;">📂 或导入自定义JSON</label>
            <label class="upload-label" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0;">
                <input type="file" id="beat-file-input" accept=".json" onchange="loadBeatData(this)">
                导入JSON
            </label>
        </div>
        
        <div style="width: 1px; height: 40px; background: #444; margin: 0 10px;"></div>
        
        <button class="control-btn" onclick="togglePlay()" id="play-btn" disabled>▶ 播放</button>
        <span id="audio-info" style="color: #888; font-size: 12px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">未加载音频</span>
    </div>
    
    <!-- 控制面板 -->
    <div id="control-panel">
        <div style="color: #fff; font-size: 14px; margin-bottom: 10px;">🎮 节奏渲染器</div>
        <button class="control-btn" onclick="rhythmRenderer.toggleDebug()">调试模式</button>
        <button class="control-btn" onclick="simulateHit()">模拟击中</button>
        <div style="margin-top: 10px; color: #888; font-size: 12px;">
            点击/空格: 击中<br>
            调试: D键
        </div>
    </div>
    
    <!-- 分数显示 -->
    <div id="score-display">
        <div class="score-value" id="score">0</div>
        <div class="combo-value" id="combo">Combo: 0</div>
    </div>
    
    <!-- 游戏容器 -->
    <div id="game-container">
        <div id="canvas-wrapper">
            <!-- 背景层 -->
            <canvas id="bg-layer" class="game-layer"></canvas>
            
            <!-- 摄像头背景层（预留） -->
            <video id="camera-layer" class="game-layer" autoplay playsinline muted></video>
            
            <!-- 命中区域 -->
            <div id="hit-zone"></div>
            
            <!-- 节奏图案层 -->
            <canvas id="rhythm-layer" class="game-layer"></canvas>
            
            <!-- UI层 -->
            <canvas id="ui-layer" class="game-layer"></canvas>
        </div>
    </div>
    
    <!-- 开始提示 -->
    <div id="start-hint">
        <div>🎮 准备开始游戏</div>
        <div style="font-size: 16px; color: #888; margin-top: 10px;">
            1. 从上方选择预设打点数据 或导入自定义 JSON<br>
            2. 上传对应的 MP3 音乐文件<br>
            3. 点击播放开始游戏！
        </div>
    </div>
    
    <!-- 调试信息 -->
    <div id="debug-info" class="hidden">
        <div>FPS: <span id="fps">0</span></div>
        <div>Audio Time: <span id="audio-time">0.000</span>s</div>
        <div>Active Notes: <span id="active-notes">0</span></div>
        <div>Next Beat: <span id="next-beat">--</span></div>
        <div>Hit Window: <span id="hit-window">--</span>ms</div>
    </div>

    <script>
        /**
         * ============================================
         * BeatTouch 节奏图案渲染模块
         * ============================================
         * 核心功能：
         * - Canvas 2D 渲染，16:9 自适应
         * - 基于 audio.currentTime 的时间同步
         * - 节奏点状态机管理
         * - 放射状运动 + 呼吸动画
         * - 预留命中/错过回调接口
         */

        // ==================== 常量定义 ====================
        const CONSTANTS = {
            // 画布比例
            ASPECT_RATIO: 16 / 9,
            
            // 时间参数（毫秒）- 延长存在时间，降低速度
            PRE_GENERATE_TIME: 2000,     // 节拍前预生成时间（延长到2秒）
            ACTIVE_WINDOW_START: 200,    // 可击中窗口开始（节拍前）
            ACTIVE_WINDOW_END: 200,      // 可击中窗口结束（节拍后）
            MISS_THRESHOLD: 500,         // 过期阈值（节拍后）
            
            // 节奏点参数 - 从圆心向外运动
            CENTER_CIRCLE_RADIUS: 320,   // 中心大圆半径（最佳点击位置）增大4倍
            NOTE_START_RADIUS: 0,        // 起始半径（从圆心开始）
            NOTE_END_RADIUS: 400,        // 结束半径（超出中心圆后消失）
            NOTE_RADIUS: 30,             // 节奏点圆形半径
            NOTE_LIFETIME: 2000,         // 总生命周期（ms，延长）
            
            // 运动速度控制
            MOVE_SPEED: 0.04,            // 运动速度系数（越小越慢）
            
            // 视觉效果
            BREATH_MIN_SCALE: 0.95,      // 呼吸最小缩放
            BREATH_MAX_SCALE: 1.05,      // 呼吸最大缩放
            BREATH_SPEED: 0.002,         // 呼吸速度（减慢）
            
            // 颜色配置
            COLORS: {
                PENDING: { r: 100, g: 100, b: 100, a: 0.3 },    // 待触发 - 灰色
                SPAWNING: { r: 150, g: 150, b: 150, a: 0.6 },   // 生成中 - 浅灰
                ACTIVE: { r: 0, g: 200, b: 255, a: 1 },         // 可击中 - 青色
                HIT: { r: 0, g: 255, b: 100, a: 1 },            // 已击中 - 绿色
                MISSED: { r: 255, g: 50, b: 50, a: 0.5 }        // 已过期 - 红色
            }
        };

        // ==================== 节奏点状态枚举 ====================
        const NoteState = {
            PENDING: 'pending',     // 预生成，未显示
            SPAWNING: 'spawning',   // 渐入动画中
            ACTIVE: 'active',       // 可击中状态
            HIT: 'hit',            // 已击中
            MISSED: 'missed',      // 已错过/过期
            FADING: 'fading'       // 消失动画中
        };

        // ==================== 节奏点类 ====================
        class RhythmNote {
            /**
             * @param {number} beatTime - 节拍时间戳（秒）
             * @param {number} index - 节拍索引
             * @param {number} angle - 发射角度（弧度）
             * @param {boolean} isLeftSide - 是否在左侧（用于对称生成）
             */
            constructor(beatTime, index, angle, isLeftSide = true) {
                this.beatTime = beatTime;           // 目标节拍时间
                this.index = index;                  // 节拍序号
                this.angle = angle;                  // 运动角度
                this.isLeftSide = isLeftSide;        // 是否在左侧
                
                // 状态管理
                this.state = NoteState.PENDING;
                this.stateStartTime = 0;             // 当前状态开始时间
                
                // 位置计算 - 从圆心开始向外运动
                this.currentRadius = CONSTANTS.NOTE_START_RADIUS;  // 从0开始
                this.x = 0;
                this.y = 0;
                
                // 目标：在节拍时刻到达中心圆周
                this.targetRadius = CONSTANTS.CENTER_CIRCLE_RADIUS;
                
                // 视觉效果
                this.scale = 0;                      // 当前缩放（渐入用）
                this.targetScale = 1;
                this.breathPhase = Math.random() * Math.PI * 2;  // 呼吸相位
                this.opacity = 0;
                
                // 击中效果
                this.hitEffectTime = 0;              // 击中效果剩余时间
                
                console.log(`[RhythmNote #${index}] 创建: beatTime=${beatTime.toFixed(3)}s, angle=${(angle * 180 / Math.PI).toFixed(1)}°, ${isLeftSide ? '左侧' : '右侧'}`);
            }

            /**
             * 更新节奏点状态
             * @param {number} audioTime - 当前音频播放时间（秒）
             * @param {number} deltaTime - 帧间隔（毫秒）
             * @param {Object} center - 画布中心点 {x, y}
             */
            update(audioTime, deltaTime, center) {
                const timeToBeat = (this.beatTime - audioTime) * 1000;  // 距离节拍的时间（毫秒，正数表示还没到）
                
                // 状态机转换
                this.updateState(timeToBeat, audioTime);
                
                // 根据状态更新视觉效果
                this.updateVisuals(timeToBeat, deltaTime);
                
                // 更新位置 - 从圆心向外运动
                this.updatePosition(center, timeToBeat, deltaTime);
                
                // 自动过期检测
                if (this.state === NoteState.ACTIVE && timeToBeat < -CONSTANTS.MISS_THRESHOLD) {
                    this.miss(audioTime);
                }
            }

            /**
             * 更新状态机
             */
            updateState(timeToBeat, audioTime) {
                const prevState = this.state;
                
                // 计算节奏点当前应该在的位置（相对于中心圆的进度）
                // 0 = 圆心, 1 = 正好在中心圆周上（节拍时刻）
                const totalTime = CONSTANTS.PRE_GENERATE_TIME + CONSTANTS.ACTIVE_WINDOW_END;
                const progress = 1 - (timeToBeat + CONSTANTS.ACTIVE_WINDOW_END) / totalTime;
                const normalizedProgress = Math.max(0, Math.min(1, progress));
                
                switch (this.state) {
                    case NoteState.PENDING:
                        // 到达预生成时间点，开始渐入
                        if (timeToBeat <= CONSTANTS.PRE_GENERATE_TIME) {
                            this.state = NoteState.SPAWNING;
                            this.stateStartTime = audioTime;
                        }
                        break;
                        
                    case NoteState.SPAWNING:
                        // 到达中心圆周附近时进入可击中状态
                        if (normalizedProgress >= 0.85) {  // 接近中心圆
                            this.state = NoteState.ACTIVE;
                            this.stateStartTime = audioTime;
                            console.log(`[RhythmNote #${this.index}] 🎯 进入可击中状态`);
                        }
                        break;
                        
                    case NoteState.ACTIVE:
                        // 保持在可击中状态，等待命中或过期
                        // 如果已经远离中心圆，自动标记为错过
                        if (normalizedProgress > 1.1) {
                            this.state = NoteState.MISSED;
                            this.stateStartTime = audioTime;
                        }
                        break;
                        
                    case NoteState.HIT:
                        // 击中后进入消失动画
                        if (this.hitEffectTime <= 0) {
                            this.state = NoteState.FADING;
                            this.stateStartTime = audioTime;
                        }
                        break;
                        
                    case NoteState.MISSED:
                        // 错过后的消失
                        this.state = NoteState.FADING;
                        this.stateStartTime = audioTime;
                        break;
                        
                    case NoteState.FADING:
                        // 完全消失后可以移除
                        break;
                }
                
                if (prevState !== this.state) {
                    console.log(`[RhythmNote #${this.index}] 状态变更: ${prevState} → ${this.state}`);
                }
            }

            /**
             * 更新视觉效果
             */
            updateVisuals(timeToBeat, deltaTime) {
                // 呼吸动画
                this.breathPhase += CONSTANTS.BREATH_SPEED * deltaTime;
                const breathScale = (Math.sin(this.breathPhase) + 1) / 2;  // 0~1
                
                // 计算整体进度 (0 = 刚生成, 1 = 正好在节拍时刻)
                const totalTime = CONSTANTS.PRE_GENERATE_TIME + CONSTANTS.ACTIVE_WINDOW_END;
                const progress = 1 - (timeToBeat + CONSTANTS.ACTIVE_WINDOW_END) / totalTime;
                const normalizedProgress = Math.max(0, Math.min(1, progress));
                
                switch (this.state) {
                    case NoteState.PENDING:
                        this.opacity = 0;
                        this.scale = 0;
                        break;
                        
                    case NoteState.SPAWNING:
                        // 渐入动画 - 从圆心缓慢出现并向外移动
                        this.opacity = Math.min(1, normalizedProgress * 3);  // 快速淡入
                        this.scale = 0.5 + normalizedProgress * 0.5;  // 从小到大
                        break;
                        
                    case NoteState.ACTIVE:
                        // 接近中心圆时高亮 + 呼吸效果
                        const proximityToCenter = 1 - Math.abs(normalizedProgress - 0.95) / 0.1;
                        const glowIntensity = Math.max(0, Math.min(1, proximityToCenter));
                        this.opacity = 1;
                        this.scale = CONSTANTS.BREATH_MIN_SCALE + 
                            (CONSTANTS.BREATH_MAX_SCALE - CONSTANTS.BREATH_MIN_SCALE) * breathScale;
                        // 在最佳点击位置附近时放大
                        if (glowIntensity > 0.5) {
                            this.scale *= (1 + glowIntensity * 0.3);
                        }
                        break;
                        
                    case NoteState.HIT:
                        // 击中效果：快速放大并淡出
                        this.hitEffectTime -= deltaTime;
                        this.scale = 1.5 + (1 - this.hitEffectTime / 200) * 2;
                        this.opacity = this.hitEffectTime / 200;
                        break;
                        
                    case NoteState.MISSED:
                    case NoteState.FADING:
                        // 淡出消失
                        this.opacity = Math.max(0, this.opacity - deltaTime / 400);
                        this.scale *= 0.98;
                        break;
                }
            }

            /**
             * 更新位置坐标 - 从圆心向外运动
             * 在节拍时刻正好到达中心圆周
             */
            updatePosition(center, timeToBeat, deltaTime) {
                // 计算应该移动到的半径位置
                // 0% 时间 = 圆心 (半径 0)
                // 100% 时间 = 中心圆周 (半径 CENTER_CIRCLE_RADIUS)
                const totalTime = CONSTANTS.PRE_GENERATE_TIME + CONSTANTS.ACTIVE_WINDOW_END;
                const progress = 1 - (timeToBeat + CONSTANTS.ACTIVE_WINDOW_END) / totalTime;
                const normalizedProgress = Math.max(0, Math.min(1.2, progress));  // 允许稍微超出
                
                // 使用缓动函数让运动更平滑
                const easedProgress = this.easeOutCubic(normalizedProgress);
                
                // 计算当前半径 - 从0到目标半径
                this.currentRadius = this.targetRadius * easedProgress;
                
                // 计算坐标
                this.x = center.x + Math.cos(this.angle) * this.currentRadius;
                this.y = center.y + Math.sin(this.angle) * this.currentRadius;
            }
            
            /**
             * 缓动函数 - easeOutCubic
             */
            easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            /**
             * 尝试击中
             * @param {number} audioTime - 当前音频时间
             * @returns {boolean} 是否成功击中
             */
            tryHit(audioTime) {
                // 只有在可击中状态或接近中心圆时才能击中
                if (this.state !== NoteState.ACTIVE && this.state !== NoteState.SPAWNING) {
                    return false;
                }
                
                // 检查是否在中心圆周附近
                const distFromCenter = Math.abs(this.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                
                // 在中心圆附近或时间窗口内都可以击中
                const timeDiff = Math.abs(audioTime - this.beatTime) * 1000;
                
                if (distFromCenter < 60 || timeDiff <= CONSTANTS.ACTIVE_WINDOW_START) {
                    this.hit(audioTime);
                    return true;
                }
                
                return false;
            }

            /**
             * 击中处理
             */
            hit(audioTime) {
                this.state = NoteState.HIT;
                this.stateStartTime = audioTime;
                this.hitEffectTime = 200;  // 击中效果持续200ms
                console.log(`[RhythmNote #${this.index}] ✅ 命中! timeDiff=${((audioTime - this.beatTime) * 1000).toFixed(1)}ms`);
                
                // 触发回调
                if (window.onNoteHit) {
                    window.onNoteHit(this, audioTime);
                }
            }

            /**
             * 错过处理
             */
            miss(audioTime) {
                this.state = NoteState.MISSED;
                this.stateStartTime = audioTime;
                console.log(`[RhythmNote #${this.index}] ❌ 错过`);
                
                // 触发回调
                if (window.onNoteMiss) {
                    window.onNoteMiss(this, audioTime);
                }
            }

            /**
             * 判断是否可以移除
             */
            canRemove() {
                return (this.state === NoteState.FADING || this.state === NoteState.HIT) && 
                       this.opacity <= 0.01;
            }

            /**
             * 渲染节奏点
             * @param {CanvasRenderingContext2D} ctx
             */
            render(ctx) {
                if (this.opacity <= 0 || this.scale <= 0) return;
                
                ctx.save();
                ctx.globalAlpha = this.opacity;
                
                // 获取颜色
                const color = this.getCurrentColor();
                
                // 外发光效果
                if (this.state === NoteState.ACTIVE || this.state === NoteState.SPAWNING) {
                    ctx.shadowBlur = 20 * this.scale;
                    ctx.shadowColor = `rgba(${color.r}, ${color.g}, ${color.b}, 0.8)`;
                }
                
                // 绘制主圆
                ctx.beginPath();
                ctx.arc(this.x, this.y, CONSTANTS.NOTE_RADIUS * this.scale, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${color.a})`;
                ctx.fill();
                
                // 绘制边框
                ctx.strokeStyle = `rgba(255, 255, 255, ${color.a * 0.8})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 绘制内部装饰
                if (this.state === NoteState.ACTIVE) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, CONSTANTS.NOTE_RADIUS * this.scale * 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, 0.3)`;
                    ctx.fill();
                }
                
                // 绘制序号（调试用）
                if (rhythmRenderer && rhythmRenderer.debugMode) {
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.index + 1, this.x, this.y);
                }
                
                ctx.restore();
            }

            /**
             * 获取当前状态对应的颜色
             * 根据距离中心圆的远近调整颜色亮度
             */
            getCurrentColor() {
                let baseColor;
                
                switch (this.state) {
                    case NoteState.PENDING:
                        return CONSTANTS.COLORS.PENDING;
                    case NoteState.SPAWNING:
                        baseColor = { ...CONSTANTS.COLORS.SPAWNING };
                        break;
                    case NoteState.ACTIVE:
                        baseColor = { ...CONSTANTS.COLORS.ACTIVE };
                        break;
                    case NoteState.HIT:
                        return CONSTANTS.COLORS.HIT;
                    case NoteState.MISSED:
                        return CONSTANTS.COLORS.MISSED;
                    case NoteState.FADING:
                        return this.state === NoteState.MISSED ? 
                               CONSTANTS.COLORS.MISSED : CONSTANTS.COLORS.HIT;
                    default:
                        return CONSTANTS.COLORS.PENDING;
                }
                
                // 在中心圆附近时增强亮度
                const distFromCenter = Math.abs(this.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                if (distFromCenter < 30) {
                    const intensity = 1 + (30 - distFromCenter) / 30 * 0.5;  // 1.0 ~ 1.5
                    baseColor.r = Math.min(255, baseColor.r * intensity);
                    baseColor.g = Math.min(255, baseColor.g * intensity);
                    baseColor.b = Math.min(255, baseColor.b * intensity);
                }
                
                return baseColor;
            }
        }

        // ==================== 节奏渲染器类 ====================
        class RhythmRenderer {
            constructor() {
                // 画布元素
                this.canvas = document.getElementById('rhythm-layer');
                this.ctx = this.canvas.getContext('2d');
                this.uiCanvas = document.getElementById('ui-layer');
                this.uiCtx = this.uiCanvas.getContext('2d');
                
                // 音频元素
                this.audioPlayer = document.getElementById('audio-player');
                
                // 节奏点管理
                this.notes = [];                    // 所有节奏点
                this.beatList = [];                 // 节拍时间戳列表
                this.nextSpawnIndex = 0;            // 下一个要生成的节拍索引
                
                // 渲染状态
                this.isRunning = false;
                this.debugMode = false;
                this.lastFrameTime = 0;
                this.fps = 0;
                
                // 画布尺寸
                this.width = 0;
                this.height = 0;
                this.center = { x: 0, y: 0 };
                
                // 游戏状态
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                
                // 初始化
                this.init();
            }

            /**
             * 初始化
             */
            init() {
                this.setupCanvas();
                this.setupEventListeners();
                window.addEventListener('resize', () => this.setupCanvas());
                console.log('[RhythmRenderer] 初始化完成');
            }

            /**
             * 设置画布尺寸
             */
            setupCanvas() {
                const wrapper = document.getElementById('canvas-wrapper');
                const rect = wrapper.getBoundingClientRect();
                
                this.width = rect.width;
                this.height = rect.height;
                this.center = { x: this.width / 2, y: this.height / 2 };
                
                // 设置所有画布尺寸
                ['bg-layer', 'rhythm-layer', 'ui-layer'].forEach(id => {
                    const canvas = document.getElementById(id);
                    canvas.width = this.width;
                    canvas.height = this.height;
                });
                
                // 绘制背景
                this.drawBackground();
            }

            /**
             * 绘制静态背景
             */
            drawBackground() {
                const bgCanvas = document.getElementById('bg-layer');
                const ctx = bgCanvas.getContext('2d');
                
                // 径向渐变背景
                const gradient = ctx.createRadialGradient(
                    this.center.x, this.center.y, 0,
                    this.center.x, this.center.y, Math.max(this.width, this.height) / 2
                );
                gradient.addColorStop(0, '#1a1a4e');
                gradient.addColorStop(0.5, '#0f0f2e');
                gradient.addColorStop(1, '#0a0a1e');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, this.width, this.height);
                
                // 绘制网格线 - 从中心放射
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 1;
                
                // 同心圆网格
                for (let r = 50; r < Math.max(this.width, this.height) / 2; r += 50) {
                    ctx.beginPath();
                    ctx.arc(this.center.x, this.center.y, r, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                // 放射线
                for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 12) {
                    ctx.beginPath();
                    ctx.moveTo(this.center.x, this.center.y);
                    ctx.lineTo(
                        this.center.x + Math.cos(angle) * Math.max(this.width, this.height),
                        this.center.y + Math.sin(angle) * Math.max(this.height, this.height)
                    );
                    ctx.stroke();
                }
                
                // 绘制中心目标圆环（静态背景部分）
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.center.x, this.center.y, CONSTANTS.CENTER_CIRCLE_RADIUS, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            }

            /**
             * 加载节拍数据
             * @param {Object} beatData - { bpm, beatList, duration }
             */
            loadBeatData(beatData) {
                this.beatList = beatData.beatList || [];
                this.nextSpawnIndex = 0;
                this.notes = [];
                
                console.log(`[RhythmRenderer] 加载节拍数据: ${this.beatList.length} 个节拍`);
                
                // 显示开始提示
                document.getElementById('start-hint').classList.add('hidden');
            }

            /**
             * 开始渲染循环
             */
            start() {
                if (this.isRunning) return;
                this.isRunning = true;
                this.lastFrameTime = performance.now();
                this.renderLoop();
                console.log('[RhythmRenderer] 渲染循环开始');
            }

            /**
             * 停止渲染循环
             */
            stop() {
                this.isRunning = false;
                console.log('[RhythmRenderer] 渲染循环停止');
            }

            /**
             * 主渲染循环
             */
            renderLoop() {
                if (!this.isRunning) return;
                
                const currentTime = performance.now();
                const deltaTime = currentTime - this.lastFrameTime;
                this.lastFrameTime = currentTime;
                
                // 计算 FPS
                this.fps = Math.round(1000 / deltaTime);
                
                // 获取音频当前时间（唯一时间基准）
                const audioTime = this.audioPlayer.currentTime;
                
                // 预生成节奏点
                this.spawnNotes(audioTime);
                
                // 更新所有节奏点
                this.updateNotes(audioTime, deltaTime);
                
                // 清空画布
                this.ctx.clearRect(0, 0, this.width, this.height);
                this.uiCtx.clearRect(0, 0, this.width, this.height);
                
                // 渲染节奏点
                this.renderNotes();
                
                // 渲染UI
                this.renderUI();
                
                // 更新调试信息
                if (this.debugMode) {
                    this.updateDebugInfo(audioTime);
                }
                
                requestAnimationFrame(() => this.renderLoop());
            }

            /**
             * 预生成节奏点 - 左右对称交替随机生成
             */
            spawnNotes(audioTime) {
                const preGenerateSec = CONSTANTS.PRE_GENERATE_TIME / 1000;
                
                while (this.nextSpawnIndex < this.beatList.length) {
                    const beatTime = this.beatList[this.nextSpawnIndex];
                    
                    // 如果节拍时间大于当前时间 + 预生成时间，则停止生成
                    if (beatTime > audioTime + preGenerateSec) {
                        break;
                    }
                    
                    // 生成左右对称的两个节奏点
                    // 左侧角度范围: 90°~270° (π/2 ~ 3π/2)
                    // 右侧角度范围: -90°~90° (-π/2 ~ π/2)
                    
                    // 交替随机位置 - 使用索引决定左右随机
                    const isEven = this.nextSpawnIndex % 2 === 0;
                    
                    // 生成左侧节奏点的随机角度 (90°~270°)
                    // 更偏向正左方 (180°)，但有随机偏移
                    const leftBaseAngle = Math.PI;  // 180° - 正左方
                    const leftRandomOffset = (Math.random() - 0.5) * Math.PI * 0.8;  // ±72° 随机
                    const leftAngle = leftBaseAngle + leftRandomOffset;
                    
                    // 右侧节奏点与左侧对称
                    const rightAngle = -leftAngle;  // 对称角度
                    
                    // 创建左侧节奏点
                    const leftNote = new RhythmNote(beatTime, this.nextSpawnIndex, leftAngle, true);
                    this.notes.push(leftNote);
                    
                    // 创建右侧节奏点（相同节拍时间，对称角度）
                    const rightNote = new RhythmNote(beatTime, this.nextSpawnIndex + 0.5, rightAngle, false);
                    this.notes.push(rightNote);
                    
                    console.log(`[RhythmRenderer] 生成对称节奏点 #${this.nextSpawnIndex}: beatTime=${beatTime.toFixed(3)}s, 角度=${(leftAngle * 180 / Math.PI).toFixed(1)}°/${(rightAngle * 180 / Math.PI).toFixed(1)}°`);
                    
                    this.nextSpawnIndex++;
                }
            }

            /**
             * 更新所有节奏点
             */
            updateNotes(audioTime, deltaTime) {
                for (let i = this.notes.length - 1; i >= 0; i--) {
                    const note = this.notes[i];
                    note.update(audioTime, deltaTime, this.center);
                    
                    // 移除已消失的节奏点
                    if (note.canRemove()) {
                        console.log(`[RhythmRenderer] 移除节奏点 #${note.index}`);
                        this.notes.splice(i, 1);
                    }
                }
            }

            /**
             * 渲染所有节奏点
             */
            renderNotes() {
                // 先渲染中心大圆（作为参考）
                this.renderCenterCircle();
                
                // 按半径排序，先画远的（在后面的）
                const sortedNotes = [...this.notes].sort((a, b) => b.currentRadius - a.currentRadius);
                
                for (const note of sortedNotes) {
                    note.render(this.ctx);
                }
            }
            
            /**
             * 渲染中心大圆 - 节奏点的目标位置
             */
            renderCenterCircle() {
                const ctx = this.ctx;
                
                ctx.save();
                
                // 外圆环
                ctx.beginPath();
                ctx.arc(this.center.x, this.center.y, CONSTANTS.CENTER_CIRCLE_RADIUS, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 4;
                ctx.stroke();
                
                // 内圆环（装饰）
                ctx.beginPath();
                ctx.arc(this.center.x, this.center.y, CONSTANTS.CENTER_CIRCLE_RADIUS - 10, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 2;
                ctx.setLineDash([10, 10]);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // 中心点
                ctx.beginPath();
                ctx.arc(this.center.x, this.center.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.fill();
                
                // 点击时机提示文字
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('点击区域', this.center.x, this.center.y - CONSTANTS.CENTER_CIRCLE_RADIUS - 15);
                
                ctx.restore();
            }

            /**
             * 渲染UI
             */
            renderUI() {
                // 击中效果文字
                for (const note of this.notes) {
                    if (note.state === NoteState.HIT && note.hitEffectTime > 0) {
                        this.uiCtx.save();
                        this.uiCtx.fillStyle = '#0f0';
                        this.uiCtx.font = 'bold 24px Arial';
                        this.uiCtx.textAlign = 'center';
                        this.uiCtx.fillText('PERFECT!', note.x, note.y - 50);
                        this.uiCtx.restore();
                    } else if (note.state === NoteState.MISSED) {
                        this.uiCtx.save();
                        this.uiCtx.fillStyle = '#f00';
                        this.uiCtx.font = 'bold 20px Arial';
                        this.uiCtx.textAlign = 'center';
                        this.uiCtx.fillText('MISS', note.x, note.y - 30);
                        this.uiCtx.restore();
                    }
                    
                    // 调试：显示距离中心圆的距离
                    if (this.debugMode && (note.state === NoteState.ACTIVE || note.state === NoteState.SPAWNING)) {
                        const distFromCenter = Math.abs(note.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                        this.uiCtx.save();
                        this.uiCtx.fillStyle = distFromCenter < 30 ? '#0f0' : '#888';
                        this.uiCtx.font = '10px Arial';
                        this.uiCtx.textAlign = 'center';
                        this.uiCtx.fillText(`${distFromCenter.toFixed(0)}px`, note.x, note.y + 25);
                        this.uiCtx.restore();
                    }
                }
                
                // 最佳点击时机提示
                const activeNotes = this.notes.filter(n => n.state === NoteState.ACTIVE);
                if (activeNotes.length > 0) {
                    // 找到最接近中心圆的节奏点
                    const closestNote = activeNotes.reduce((closest, note) => {
                        const noteDist = Math.abs(note.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                        const closestDist = Math.abs(closest.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                        return noteDist < closestDist ? note : closest;
                    });
                    
                    const dist = Math.abs(closestNote.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                    
                    // 在中心圆附近显示提示
                    if (dist < 40) {
                        this.uiCtx.save();
                        this.uiCtx.strokeStyle = `rgba(0, 255, 100, ${1 - dist / 40})`;
                        this.uiCtx.lineWidth = 3;
                        this.uiCtx.beginPath();
                        this.uiCtx.arc(this.center.x, this.center.y, CONSTANTS.CENTER_CIRCLE_RADIUS, 0, Math.PI * 2);
                        this.uiCtx.stroke();
                        this.uiCtx.restore();
                    }
                }
            }

            /**
             * 更新调试信息
             */
            updateDebugInfo(audioTime) {
                document.getElementById('fps').textContent = this.fps;
                document.getElementById('audio-time').textContent = audioTime.toFixed(3);
                document.getElementById('active-notes').textContent = this.notes.length;
                
                // 下一个节拍信息
                if (this.nextSpawnIndex < this.beatList.length) {
                    const nextBeat = this.beatList[this.nextSpawnIndex];
                    const timeToNext = (nextBeat - audioTime) * 1000;
                    document.getElementById('next-beat').textContent = 
                        `${nextBeat.toFixed(2)}s (${timeToNext.toFixed(0)}ms)`;
                } else {
                    document.getElementById('next-beat').textContent = '无';
                }
                
                // 找到最接近中心圆的节奏点
                let closestDist = Infinity;
                let closestTimeDiff = Infinity;
                for (const note of this.notes) {
                    if (note.state === NoteState.ACTIVE || note.state === NoteState.SPAWNING) {
                        const dist = Math.abs(note.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                        if (dist < closestDist) {
                            closestDist = dist;
                            closestTimeDiff = Math.abs(audioTime - note.beatTime) * 1000;
                        }
                    }
                }
                
                const hitWindowEl = document.getElementById('hit-window');
                if (closestDist === Infinity) {
                    hitWindowEl.textContent = '--';
                    hitWindowEl.style.color = '#0f0';
                } else {
                    hitWindowEl.textContent = `${closestDist.toFixed(0)}px / ${closestTimeDiff.toFixed(0)}ms`;
                    // 在最佳点击位置附近时变绿色
                    hitWindowEl.style.color = closestDist < 30 ? '#0f0' : '#888';
                }
            }

            /**
             * 尝试击中节奏点
             * 判断依据：节奏点是否在中心圆周附近（最佳点击位置）
             */
            tryHit() {
                const audioTime = this.audioPlayer.currentTime;
                let hitNote = null;
                let bestScore = Infinity;
                
                // 找到最接近中心圆周的可击中节奏点
                for (const note of this.notes) {
                    if (note.state === NoteState.ACTIVE || note.state === NoteState.SPAWNING) {
                        // 计算距离中心圆周的距离
                        const distFromCenter = Math.abs(note.currentRadius - CONSTANTS.CENTER_CIRCLE_RADIUS);
                        // 计算时间差
                        const timeDiff = Math.abs(audioTime - note.beatTime) * 1000;
                        
                        // 综合评分：距离中心圆越近越好
                        const score = distFromCenter + timeDiff * 0.1;
                        
                        if (distFromCenter < 50 && score < bestScore) {  // 在中心圆附近50像素内
                            bestScore = score;
                            hitNote = note;
                        }
                    }
                }
                
                // 尝试击中
                if (hitNote && hitNote.tryHit(audioTime)) {
                    this.onHit(hitNote, Math.abs(audioTime - hitNote.beatTime));
                    return true;
                }
                
                console.log('[RhythmRenderer] 未命中任何节奏点');
                return false;
            }

            /**
             * 击中回调
             */
            onHit(note, timeDiff) {
                this.combo++;
                this.maxCombo = Math.max(this.maxCombo, this.combo);
                
                // 根据准确度计算分数
                const accuracy = 1 - (timeDiff / (CONSTANTS.ACTIVE_WINDOW_START / 1000));
                const points = Math.round(100 * accuracy + this.combo * 10);
                this.score += points;
                
                // 更新UI
                document.getElementById('score').textContent = this.score;
                document.getElementById('combo').textContent = `Combo: ${this.combo}`;
                
                console.log(`[RhythmRenderer] ✅ 命中! 准确度=${(accuracy * 100).toFixed(1)}%, 分数=${points}, 连击=${this.combo}`);
            }

            /**
             * 错过回调
             */
            onMiss(note) {
                this.combo = 0;
                document.getElementById('combo').textContent = `Combo: ${this.combo}`;
                console.log(`[RhythmRenderer] ❌ 错过节奏点 #${note.index}`);
            }

            /**
             * 切换调试模式
             */
            toggleDebug() {
                this.debugMode = !this.debugMode;
                document.getElementById('debug-info').classList.toggle('hidden');
                console.log(`[RhythmRenderer] 调试模式: ${this.debugMode ? '开启' : '关闭'}`);
            }

            /**
             * 设置事件监听
             */
            setupEventListeners() {
                // 键盘控制
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.tryHit();
                    } else if (e.code === 'KeyD') {
                        this.toggleDebug();
                    }
                });
                
                // 鼠标/触摸点击
                this.canvas.addEventListener('mousedown', () => this.tryHit());
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.tryHit();
                });
            }
        }

        // ==================== 全局回调接口 ====================

         * 节奏点命中回调（供外部模块调用，如手部识别）
         * @param {RhythmNote} note - 命中的节奏点

        window.onNoteHit = function(note, audioTime) {

            // 这里可以接入手部识别、碰撞检测等外部逻辑
        };

        // ==================== 全局变量和函数 ====================
        let rhythmRenderer;
        let beatData = null;

        /**
         * 加载预设打点数据（从 music-point 目录）
         */
        async function loadPresetBeatData(select) {
            const filePath = select.value;
            if (!filePath) return;

            try {
                console.log(`[Main] 加载预设打点数据: ${filePath}`);
                const response = await fetch(filePath);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                beatData = await response.json();
                console.log('[Main] 预设打点数据加载成功:', beatData);
                
                // 加载到渲染器
                rhythmRenderer.loadBeatData(beatData);
                
                // 更新UI提示
                const fileName = filePath.split('/').pop().replace(/beat-data-\d+\(|\)\.json/g, '');
                document.getElementById('audio-info').textContent = `已选: ${fileName}`;
                
                // 启用播放按钮（如果有音频）
                document.getElementById('play-btn').disabled = !document.getElementById('audio-player').src;
                
                // 提示用户上传对应音乐
                if (!document.getElementById('audio-player').src) {
                    alert(`已加载「${fileName}」的打点数据（${beatData.beatList.length} 个节拍点）\n\n请上传对应的 MP3 音乐文件开始游戏！`);
                } else {
                    alert(`成功加载 ${beatData.beatList.length} 个节拍点`);
                }
                
            } catch (err) {
                console.error('[Main] 加载预设失败:', err);
                alert('加载预设失败: ' + err.message + '\n\n请确保通过 Live Server 运行以支持 fetch API');
                select.value = '';
            }
        }

        /**
         * 加载自定义节拍数据文件
         */
        function loadBeatData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    beatData = JSON.parse(e.target.result);
                    console.log('[Main] 自定义节拍数据加载成功:', beatData);
                    
                    // 加载到渲染器
                    rhythmRenderer.loadBeatData(beatData);
                    
                    // 启用播放按钮
                    document.getElementById('play-btn').disabled = !document.getElementById('audio-player').src;
                    
                    // 重置预设选择框
                    document.getElementById('preset-beat-select').value = '';
                    
                    alert(`成功加载 ${beatData.beatList.length} 个节拍点`);
                } catch (err) {
                    alert('加载失败: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        /**
         * 音频上传处理
         */
        document.getElementById('audio-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const audioPlayer = document.getElementById('audio-player');
            audioPlayer.src = url;
            
            // 提取文件名（不含扩展名）用于匹配提示
            const songName = file.name.replace(/\.[^/.]+$/, '');
            document.getElementById('audio-info').textContent = `🎵 ${file.name}`;
            document.getElementById('play-btn').disabled = !beatData;
            
            console.log('[Main] 音频加载:', file.name);
            
            // 提示用户选择打点数据（如果还没选）
            if (!beatData) {
                alert(`已上传音乐: ${songName}\n\n请从上方选择对应的打点数据！`);
            }
        });

        /**
         * 播放/暂停切换
         */
        function togglePlay() {
            const audioPlayer = document.getElementById('audio-player');
            const btn = document.getElementById('play-btn');
            
            if (audioPlayer.paused) {
                audioPlayer.play();
                btn.textContent = '⏸ 暂停';
                rhythmRenderer.start();
            } else {
                audioPlayer.pause();
                btn.textContent = '▶ 播放';
                rhythmRenderer.stop();
            }
        }

        /**
         * 模拟击中（测试用）
         */
        function simulateHit() {
            rhythmRenderer.tryHit();
        }

        // 音频播放结束处理
        document.getElementById('audio-player').addEventListener('ended', function() {
            document.getElementById('play-btn').textContent = '▶ 播放';
            rhythmRenderer.stop();
        });

        // ==================== 初始化 ====================
        window.addEventListener('DOMContentLoaded', () => {
            rhythmRenderer = new RhythmRenderer();
            console.log('[Main] BeatTouch 节奏渲染器已加载');
            console.log('[Main] 操作说明:');
            console.log('  - 空格键/点击: 击中节奏点');
            console.log('  - D键: 切换调试模式');
            console.log('  - 先上传音乐，再导入打点JSON');
        });
    </script>
</body>
</html>
